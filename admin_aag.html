<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Admin AAG - Villa María Golf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f8;
            margin: 0;
            padding: 30px;
            color: #1f2937;
        }

        .card {
            max-width: 920px;
            margin: auto;
            background: #fff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
        }

        .inner-card {
            margin-top: 18px;
            background: #fff;
            border: 1px solid #e5e7eb;
            padding: 18px;
            border-radius: 16px;
        }

        h1 {
            margin-top: 0;
            color: #3e5740;
        }

        h2 {
            color: #166534;
            margin-bottom: 8px;
        }

        h3 {
            margin-top: 20px;
            margin-bottom: 10px;
            color: #374151;
        }

        button {
            background: #ec9b58;
            color: rgb(255, 255, 255);
            border: 0;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 16px;
            cursor: pointer;
        }

        button:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        pre {
            margin-top: 18px;
            background: #f3f4f6;
            padding: 14px;
            border-radius: 10px;
            white-space: pre-wrap;
            font-size: 14px;
        }

        .ok {
            color: #166534;
            font-weight: bold;
        }

        .err {
            color: #b91c1c;
            font-weight: bold;
        }

        .muted {
            color: #6b7280;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin: 14px 0 18px;
        }

        .summary-box {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 14px;
            background: #f9fafb;
        }

        .summary-box b {
            display: block;
            font-size: 28px;
            color: #166534;
        }

        .sync-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 8px;
        }

        .sync-table th,
        .sync-table td {
            border-bottom: 1px solid #e5e7eb;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }

        .sync-table th {
            background: #f9fafb;
            color: #374151;
            font-size: 12px;
            text-transform: uppercase;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-new {
            color: #065f46;
            background: #d1fae5;
        }

        .badge-index {
            color: #92400e;
            background: #fef3c7;
        }

        .badge-down {
            color: #991b1b;
            background: #fee2e2;
        }

        .search-results {
            margin-top: 10px;
            max-height: 360px;
            overflow: auto;
        }

        .player-card {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 11px;
            margin-bottom: 8px;
            cursor: pointer;
            background: #fff;
            transition: .12s ease;
        }

        .player-card:hover {
            border-color: #9ca3af;
            transform: translateY(-1px);
        }

        .player-card.active {
            border-color: #166534;
            box-shadow: 0 0 0 2px rgba(22, 101, 52, .12);
        }

        .player-name {
            font-weight: 800;
            font-size: 14px;
            line-height: 1.25;
            margin-bottom: 5px;
        }

        .player-extra {
            font-size: 12px;
            color: #6b7280;
            line-height: 1.35;
        }

        .player-detail {
            margin-top: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 14px;
            background: #f9fafb;
            font-size: 14px;
            line-height: 1.45;
        }

        .empty {
            padding: 14px;
            color: #6b7280;
            background: #fff;
            border-radius: 12px;
            border: 1px dashed #d1d5db;
        }

        .home-btn {
            position: fixed;
            top: 30px;
            right: 27px;
            width: 38px;
            height: 38px;
            border-radius: 6px;
            background: #166534;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
            z-index: 9999;
            transition: transform 0.15s, background 0.15s;
        }

        .home-btn:hover {
            background: #14532d;
            transform: scale(1.05);
        }


        .assoc-panel {
            margin-top: 16px;
            border: 2px solid #f59e0b;
            background: #fffbeb;
            border-radius: 16px;
            padding: 16px;
        }

        .assoc-title {
            font-weight: 800;
            color: #92400e;
            margin-bottom: 8px;
        }

        .assoc-item {
            background: #fff;
            border: 1px solid #fde68a;
            border-radius: 14px;
            padding: 14px;
            margin-top: 12px;
        }

        .assoc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 12px 0;
        }

        .assoc-box {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px;
            background: #f9fafb;
            font-size: 13px;
            line-height: 1.45;
        }

        .assoc-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-secondary {
            background: #6b7280;
        }

        .btn-danger {
            background: #b91c1c;
        }

        @media (max-width: 760px) {
            .assoc-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 760px) {
            body {
                padding: 16px;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .sync-table {
                font-size: 12px;
            }
        }

        @media print {

            @page {
                size: A4 portrait;
                margin: 12mm;
            }

            html,
            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                font-size: 11px;
                color: #111827;
            }

            body.imprimiendo-sync .home-btn,
            body.imprimiendo-sync #btnSync,
            body.imprimiendo-sync #btnImprimirSync,
            body.imprimiendo-sync #resultado,
            body.imprimiendo-sync hr,
            body.imprimiendo-sync #buscadorJugador,
            body.imprimiendo-sync #resultadosBusqueda,
            body.imprimiendo-sync h2:nth-of-type(2),
            body.imprimiendo-sync .card>p {
                display: none !important;
            }

            body.imprimiendo-sync .card {
                max-width: 100% !important;
                width: 100% !important;
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
            }

            body.imprimiendo-sync .inner-card {
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                background: white !important;
            }

            body.imprimiendo-sync h1 {
                font-size: 24px;
                color: #166534 !important;
                margin-bottom: 4px;
            }

            body.imprimiendo-sync h2 {
                font-size: 18px;
                margin-top: 26px;
                margin-bottom: 10px;
                padding-bottom: 4px;
                border-bottom: 2px solid #d1d5db;
                color: #111827;
            }

            body.imprimiendo-sync h3 {
                margin-top: 20px;
                margin-bottom: 8px;
                font-size: 15px;
            }

            body.imprimiendo-sync .summary-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin: 18px 0 24px;
            }

            body.imprimiendo-sync .summary-box {
                border: 1px solid #d1d5db;
                border-radius: 10px;
                padding: 12px;
                text-align: center;
                background: #f9fafb !important;
            }

            body.imprimiendo-sync .summary-box b {
                font-size: 28px;
                display: block;
                margin-top: 6px;
                color: #166534;
            }

            body.imprimiendo-sync .sync-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 6px;
                font-size: 10px;
            }

            body.imprimiendo-sync .sync-table th {
                background: #e5e7eb !important;
                color: #111827 !important;
                padding: 6px;
                border: 1px solid #d1d5db;
                text-transform: uppercase;
                font-size: 9px;
            }

            body.imprimiendo-sync .sync-table td {
                padding: 5px;
                border: 1px solid #e5e7eb;
                vertical-align: top;
            }

            body.imprimiendo-sync .sync-table tr:nth-child(even) {
                background: #f9fafb !important;
            }

            body.imprimiendo-sync .badge {
                border: 1px solid #d1d5db;
                font-size: 11px;
                padding: 4px 10px;
            }

            body.imprimiendo-sync .badge-new {
                background: #dcfce7 !important;
                color: #166534 !important;
            }

            body.imprimiendo-sync .badge-index {
                background: #fef3c7 !important;
                color: #92400e !important;
            }

            body.imprimiendo-sync .badge-down {
                background: #fee2e2 !important;
                color: #991b1b !important;
            }

            body.imprimiendo-sync table,
            body.imprimiendo-sync tr,
            body.imprimiendo-sync td {
                page-break-inside: avoid !important;
            }
        }
    </style>
</head>

<body>
    <div class="home-btn" id="btnHome" title="Volver al panel">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M3 10L12 3L21 10V20C21 20.55 20.55 21 20 21H4C3.45 21 3 20.55 3 20V10Z" stroke="white"
                stroke-width="2" />
        </svg>
    </div>

    <div class="card">
        <h1>Sincronización AAG</h1>

        <p>
            Sincronización de Jugadores matriculados en la <b>AAG</b>. Actualización de Index y reporte de cambios en
            socios del <b>Villa María Golf Club.</b>
        </p>

        <button id="btnSync">Actualizar Index</button>
        <button id="btnImprimirSync" disabled>Imprimir reporte A4</button>

        <pre id="resultado">Esperando acción...</pre>

        <div class="inner-card">
            <h2>Última sincronización AAG</h2>
            <div id="detalleSync">Sin datos todavía.</div>
            <div id="asociacionesAAG"></div>
        </div>

        <hr style="margin:24px 0;">

        <h2>Buscar jugador</h2>

        <p>
            Buscá por nombre, apellido o matrícula.
        </p>

        <input id="buscadorJugador" placeholder="Nombre, Apellido o Matrícula" autocomplete="off"
            style="padding:10px; width:100%; max-width:360px;">

        <div id="resultadosBusqueda" style="margin-top:12px;"></div>
    </div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

        const SUPABASE_URL = "https://bnnfolhrqxgxjmobclrm.supabase.co";
        const SUPABASE_KEY = "sb_publishable_pNxU4AFpAZPpeJ0wICLvIw_6nW90njQ";
        const FUNCTION_URL = `${SUPABASE_URL}/functions/v1/swift-worker`;
        const VMGC_CLUB_ID = 408;

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentSession = null;

        async function exigirAdmin() {
            const { data: { session } } = await supabase.auth.getSession();
            currentSession = session;

            if (!session) {
                window.location.href = "login.html";
                throw new Error("Sin sesión");
            }

            const { data: profile, error } = await supabase
                .from("profiles")
                .select("role, active")
                .eq("id", session.user.id)
                .maybeSingle();

            if (error || !profile || profile.active !== true || profile.role !== "admin") {
                alert("No tenés permiso para entrar a esta página.");
                window.location.href = "panel.html";
                throw new Error("Sin permiso admin");
            }

            return session.user;
        }

        await exigirAdmin();

        const btnSync = document.getElementById("btnSync");
        const resultado = document.getElementById("resultado");
        const btnImprimirSync = document.getElementById("btnImprimirSync");
        let ultimoReporteSync = null;
        const buscadorJugador = document.getElementById("buscadorJugador");
        const resultadosBusqueda = document.getElementById("resultadosBusqueda");

        let searchTimer = null;
        let ultimosResultados = [];

        function normalizarTexto(txt) {
            return String(txt || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toUpperCase()
                .trim();
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function formatIndex(value) {
            const n = Number(String(value ?? "").replace(",", "."));
            return Number.isFinite(n) ? n.toFixed(1) : "—";
        }

        function toIndexNumber(value) {
            const n = Number(String(value ?? "").replace(",", "."));
            return Number.isFinite(n) ? Math.round(n * 10) / 10 : null;
        }

        function mismaMatricula(value) {
            return String(value ?? "").trim();
        }

        function esVMGC(p) {
            return Number(p?.option_club_id) === VMGC_CLUB_ID || p?.is_club_member === true;
        }

        function estaActivoAAG(p) {
            return p?.is_aag_active !== false;
        }

        function esMiembroVMGCActivo(p) {
            return !!p && esVMGC(p) && estaActivoAAG(p);
        }

        function nombreDesdePlayer(p) {
            return p.full_name ||
                [p.last_name, p.first_name].filter(Boolean).join(", ") ||
                "Sin nombre";
        }

        function origenTexto(p) {
            return p.origen_busqueda === "players"
                ? "Players"
                : "Padrón AAG";
        }

        function generoTexto(gender) {
            const g = String(gender || "").toLowerCase();

            if (
                g === "female" ||
                g === "f" ||
                g === "1" ||
                g === "dama" ||
                g === "damas"
            ) {
                return "Dama";
            }

            return "Caballero";
        }

        async function selectAllRows({ table, select, orderBy = "aag_member_number", filters }) {
            const pageSize = 1000;
            let from = 0;
            let all = [];

            while (true) {
                let query = supabase
                    .from(table)
                    .select(select)
                    .range(from, from + pageSize - 1);

                if (orderBy) query = query.order(orderBy, { ascending: true });

                if (typeof filters === "function") {
                    query = filters(query);
                }

                const { data, error } = await query;
                if (error) throw error;

                all = all.concat(data || []);

                if (!data || data.length < pageSize) break;
                from += pageSize;
            }

            return all;
        }

        async function getPlayersSnapshot() {
            const rows = await selectAllRows({
                table: "players",
                select: `
                    id,
                    first_name,
                    last_name,
                    full_name,
                    gender,
                    current_index,
                    aag_member_number,
                    country,
                    club_name,
                    option_club_id,
                    is_club_member,
                    is_aag_active,
                    source,
                    search_text,
                    index_updated_at
                `,
                orderBy: "aag_member_number",
                filters: q => q.not("aag_member_number", "is", null)
            });

            const map = new Map();

            for (const p of rows || []) {
                const matricula = mismaMatricula(p.aag_member_number);
                if (!matricula) continue;
                map.set(matricula, p);
            }

            return map;
        }



        function nombreClaveJugador(p) {
            const apellido = normalizarTexto(p.last_name || "");
            const nombre = normalizarTexto(p.first_name || "");

            if (apellido || nombre) {
                return `${apellido}|${nombre}`;
            }

            const full = normalizarTexto(p.full_name || "").replace(/,/g, " ").replace(/\s+/g, " ").trim();
            const partes = full.split(" ").filter(Boolean);

            if (partes.length >= 2) {
                return `${partes[0]}|${partes.slice(1).join(" ")}`;
            }

            return full;
        }

        function generoClave(gender) {
            return generoTexto(gender) === "Dama" ? "female" : "male";
        }

        async function getPlayersSinMatricula() {
            return await selectAllRows({
                table: "players",
                select: `
                    id,
                    first_name,
                    last_name,
                    full_name,
                    gender,
                    current_index,
                    aag_member_number,
                    country,
                    club_name,
                    option_club_id,
                    is_club_member,
                    is_aag_active,
                    source,
                    search_text
                `,
                orderBy: "full_name",
                filters: q => q.is("aag_member_number", null)
            });
        }

        async function getAagVMGCSnapshot() {
            return await selectAllRows({
                table: "aag_enrolleds",
                select: `
                    enrollment_number,
                    first_name,
                    last_name,
                    full_name,
                    gender,
                    current_index,
                    option_club_id,
                    club_name,
                    search_text
                `,
                orderBy: "enrollment_number",
                filters: q => q.eq("option_club_id", VMGC_CLUB_ID)
            });
        }

        async function contarUsoJugador(playerId) {
            const tablas = [
                { table: "registrations", col: "linked_player_id" },
                { table: "scorecards", col: "linked_player_id" },
                { table: "tournament_payments", col: "linked_player_id" }
            ];

            const out = {};

            for (const t of tablas) {
                const { count, error } = await supabase
                    .from(t.table)
                    .select("id", { count: "exact", head: true })
                    .eq(t.col, playerId);

                if (error) {
                    console.warn(`No se pudo contar ${t.table}:`, error);
                    out[t.table] = null;
                } else {
                    out[t.table] = count || 0;
                }
            }

            return out;
        }

        async function detectarPosiblesAsociacionesAAG() {
            resultado.textContent = "Buscando posibles jugadores manuales para asociar antes de sincronizar...";

            const beforeMap = await getPlayersSnapshot();
            const playersConMatricula = new Set([...beforeMap.keys()].map(String));
            // Jugadores creados a mano suelen venir así:
            // source = "manual", aag_member_number = null, is_aag_active = false.
            // Por eso NO hay que filtrar por is_aag_active, porque justamente
            // quedarían afuera los jugadores manuales que queremos asociar.
            const manuales = (await getPlayersSinMatricula())
                .filter(p => nombreClaveJugador(p) && !mismaMatricula(p.aag_member_number));
            const aagVMGC = await getAagVMGCSnapshot();

            const manualesPorClave = new Map();

            for (const p of manuales) {
                const clave = `${nombreClaveJugador(p)}|${generoClave(p.gender)}`;
                if (!manualesPorClave.has(clave)) manualesPorClave.set(clave, []);
                manualesPorClave.get(clave).push(p);
            }

            const pendientes = [];

            for (const aag of aagVMGC) {
                const matricula = mismaMatricula(aag.enrollment_number);
                if (!matricula || playersConMatricula.has(matricula)) continue;

                const clave = `${nombreClaveJugador(aag)}|${generoClave(aag.gender)}`;
                const candidatos = manualesPorClave.get(clave) || [];

                if (!candidatos.length) continue;

                pendientes.push({
                    aag: {
                        ...aag,
                        aag_member_number: matricula
                    },
                    candidatos: candidatos.slice(0, 5)
                });
            }

            for (const item of pendientes) {
                for (const candidato of item.candidatos) {
                    candidato.usos = await contarUsoJugador(candidato.id);
                }
            }

            return pendientes;
        }

        function renderAsociacionesPendientes(pendientes) {
            const box = document.getElementById("asociacionesAAG");
            if (!box) return;

            if (!pendientes.length) {
                box.innerHTML = "";
                return;
            }

            box.innerHTML = `
                <div class="assoc-panel">
                    <div class="assoc-title">Antes de sincronizar, revisá estas posibles asociaciones AAG</div>
                    <p class="muted">Encontré jugadores manuales sin matrícula que tienen el mismo nombre, apellido y género que jugadores nuevos del padrón AAG. Si corresponde, asociá el jugador viejo para conservar torneos, pagos y tarjetas.</p>

                    ${pendientes.map((item, idx) => `
                        <div class="assoc-item" data-assoc-idx="${idx}">
                            <b>Caso ${idx + 1}: ${escapeHtml(nombreDesdePlayer(item.aag))}</b>
                            <div class="assoc-grid">
                                <div class="assoc-box">
                                    <b>Nuevo dato AAG</b><br>
                                    Matrícula: <b>${escapeHtml(item.aag.aag_member_number)}</b><br>
                                    Index: <b>${escapeHtml(formatIndex(item.aag.current_index))}</b><br>
                                    Género: <b>${escapeHtml(generoTexto(item.aag.gender))}</b><br>
                                    Club: <b>${escapeHtml(item.aag.club_name || "Villa María Golf Club")}</b>
                                </div>
                                <div class="assoc-box">
                                    <b>Jugador/es manual/es encontrado/s</b><br>
                                    ${item.candidatos.map((c, cidx) => `
                                        <div style="margin-top:8px; padding-top:8px; border-top:1px solid #e5e7eb;">
                                            <b>${escapeHtml(nombreDesdePlayer(c))}</b><br>
                                            Index actual: ${escapeHtml(formatIndex(c.current_index))}<br>
                                            Torneos/inscripciones: ${c.usos?.registrations ?? "—"} ·
                                            Tarjetas: ${c.usos?.scorecards ?? "—"} ·
                                            Pagos: ${c.usos?.tournament_payments ?? "—"}<br>
                                            <button data-assoc-action="link" data-assoc-idx="${idx}" data-candidato-idx="${cidx}" style="margin-top:8px; padding:8px 10px; font-size:13px;">Asociar a este</button>
                                        </div>
                                    `).join("")}
                                </div>
                            </div>
                            <div class="assoc-actions">
                                <button class="btn-secondary" data-assoc-action="skip" data-assoc-idx="${idx}">Crear jugador nuevo / ignorar este caso</button>
                            </div>
                        </div>
                    `).join("")}

                    <p class="muted" style="margin-top:12px;">Cuando resuelvas todos los casos, la sincronización sigue automáticamente.</p>
                </div>
            `;

            box.querySelectorAll("[data-assoc-action]").forEach(btn => {
                btn.addEventListener("click", async () => {
                    const idx = Number(btn.dataset.assocIdx);
                    const action = btn.dataset.assocAction;
                    const item = pendientes[idx];

                    if (!item) return;

                    try {
                        btn.disabled = true;

                        if (action === "link") {
                            const cidx = Number(btn.dataset.candidatoIdx);
                            const candidato = item.candidatos[cidx];
                            if (!candidato) return;

                            const ok = confirm(`¿Asociar ${nombreDesdePlayer(candidato)} con la matrícula AAG ${item.aag.aag_member_number}?`);
                            if (!ok) {
                                btn.disabled = false;
                                return;
                            }

                            await asociarPlayerManualConAAG(candidato, item.aag);
                        }

                        pendientes.splice(idx, 1);

                        if (pendientes.length) {
                            renderAsociacionesPendientes(pendientes);
                        } else {
                            renderAsociacionesPendientes([]);
                            await ejecutarSyncAAG();
                        }
                    } catch (error) {
                        console.error(error);
                        alert(`Error al asociar: ${error.message || error}`);
                        btn.disabled = false;
                    }
                });
            });
        }

        async function asociarPlayerManualConAAG(playerManual, aag) {
            const matricula = mismaMatricula(aag.aag_member_number || aag.enrollment_number);

            const payload = {
                aag_member_number: matricula,
                first_name: aag.first_name || playerManual.first_name || null,
                last_name: aag.last_name || playerManual.last_name || null,
                gender: aag.gender || playerManual.gender || null,
                current_index: aag.current_index ?? playerManual.current_index ?? null,
                country: "Argentina",
                club_name: aag.club_name || "Villa María Golf Club",
                option_club_id: Number(aag.option_club_id) || VMGC_CLUB_ID,
                is_club_member: Number(aag.option_club_id) === VMGC_CLUB_ID,
                is_aag_active: true,
                source: "aag",
                index_updated_at: new Date().toISOString()
            };

            const { error } = await supabase
                .from("players")
                .update(payload)
                .eq("id", playerManual.id);

            if (error) throw error;
        }

        async function iniciarSyncConRevisionAAG() {
            btnSync.disabled = true;

            try {
                const pendientes = await detectarPosiblesAsociacionesAAG();

                if (pendientes.length) {
                    resultado.innerHTML = `<span class="err">Sincronización pausada</span>\n\nHay ${pendientes.length} posible/s jugador/es para asociar antes de crear duplicados.`;
                    renderAsociacionesPendientes(pendientes);
                    return;
                }

                renderAsociacionesPendientes([]);
                await ejecutarSyncAAG();
            } catch (err) {
                console.error(err);
                resultado.innerHTML = `<span class="err">Error</span>\n\n${escapeHtml(err.message || err)}`;
            } finally {
                btnSync.disabled = false;
            }
        }

        async function ejecutarSyncAAG() {
            btnSync.disabled = true;
            resultado.textContent = "Tomando foto previa de players VMGC 408...";

            try {
                const beforeMap = await getPlayersSnapshot();

                resultado.textContent = "Sincronizando con AAG... puede tardar un poco.";

                const res = await fetch(FUNCTION_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": currentSession?.access_token ? `Bearer ${currentSession.access_token}` : undefined,
                        "apikey": SUPABASE_KEY
                    },
                    body: JSON.stringify({
                        action: "sync_vmgc",
                        club_id: VMGC_CLUB_ID,
                        detail_changes: true
                    })
                });

                const text = await res.text();
                let data = {};

                try {
                    data = text ? JSON.parse(text) : {};
                } catch (_) {
                    data = { raw_response: text };
                }

                if (!res.ok || data.ok === false) {
                    throw new Error(data.error || data.message || text || "Error desconocido");
                }

                resultado.textContent = "Leyendo players actualizados y armando detalle...";

                const afterMap = await getPlayersSnapshot();
                const changes = armarCambiosSync(beforeMap, afterMap, data);

                await guardarHistorialSync(changes, data);

                resultado.innerHTML =
                    `<span class="ok">Sincronización correcta</span>\n\n` +
                    `Club: Villa María Golf Club (${VMGC_CLUB_ID})\n` +
                    `Altas: ${changes.added.length}\n` +
                    `Cambios de index: ${changes.updated.length}\n` +
                    `Dejaron de ser miembros: ${changes.deactivated.length}`;

                renderDetalleSync(changes);

                ultimoReporteSync = changes;
                btnImprimirSync.disabled = false;
            } catch (err) {
                console.error(err);
                resultado.innerHTML = `<span class="err">Error</span>\n\n${escapeHtml(err.message || err)}`;
            } finally {
                btnSync.disabled = false;
            }
        }

        function armarCambiosSync(beforeMap, afterMap, workerData = {}) {
            const added = [];
            const updated = [];
            const deactivated = [];

            for (const [matricula, after] of afterMap.entries()) {
                const before = beforeMap.get(matricula);

                if (!esMiembroVMGCActivo(after)) continue;

                if (!before || !esMiembroVMGCActivo(before)) {
                    added.push({
                        matricula,
                        nombre: nombreDesdePlayer(after),
                        index: toIndexNumber(after.current_index),
                        club: after.club_name || "Villa María Golf Club"
                    });
                    continue;
                }

                const oldIndex = toIndexNumber(before.current_index);
                const newIndex = toIndexNumber(after.current_index);

                if (oldIndex !== newIndex) {
                    updated.push({
                        matricula,
                        nombre: nombreDesdePlayer(after),
                        old_index: oldIndex,
                        new_index: newIndex,
                        club: after.club_name || "Villa María Golf Club"
                    });
                }
            }

            for (const [matricula, before] of beforeMap.entries()) {
                if (!esMiembroVMGCActivo(before)) continue;

                const after = afterMap.get(matricula);

                if (!after || !esMiembroVMGCActivo(after)) {
                    deactivated.push({
                        matricula,
                        nombre: nombreDesdePlayer(after || before),
                        old_index: toIndexNumber(before.current_index),
                        new_index: after ? toIndexNumber(after.current_index) : null,
                        old_club: before.club_name || "Villa María Golf Club",
                        new_club: after?.club_name || "Sin club VMGC",
                        reason: !after
                            ? "Ya no aparece en players después de sincronizar."
                            : "Ya no figura como miembro activo del club 408."
                    });
                }
            }

            added.sort((a, b) => String(a.nombre).localeCompare(String(b.nombre)));
            updated.sort((a, b) => String(a.nombre).localeCompare(String(b.nombre)));
            deactivated.sort((a, b) => String(a.nombre).localeCompare(String(b.nombre)));

            return {
                added,
                updated,
                deactivated,
                totals: {
                    before_vmgc: [...beforeMap.values()].filter(esMiembroVMGCActivo).length,
                    after_vmgc: [...afterMap.values()].filter(esMiembroVMGCActivo).length,
                    total_received: workerData.total_received ?? workerData.totalReceived ?? null,
                    total_filtered: workerData.total_filtered ?? workerData.totalFiltered ?? null,
                    total_upserted: workerData.total_upserted ?? workerData.totalUpserted ?? null
                }
            };
        }

        async function guardarHistorialSync(changes, workerData = {}) {
            const payload = {
                club_id: VMGC_CLUB_ID,
                generated_at: new Date().toISOString(),
                totals: changes.totals || {},
                added: changes.added || [],
                updated: changes.updated || [],
                deactivated: changes.deactivated || [],
                worker_response: workerData || {}
            };

            const { error } = await supabase
                .from("aag_sync_history")
                .insert({
                    created_by: currentSession?.user?.id || null,
                    club_id: VMGC_CLUB_ID,
                    added_count: changes.added.length,
                    updated_count: changes.updated.length,
                    deactivated_count: changes.deactivated.length,
                    before_vmgc: changes.totals?.before_vmgc ?? null,
                    after_vmgc: changes.totals?.after_vmgc ?? null,
                    data: payload
                });

            if (error) {
                console.warn("No se pudo guardar historial AAG:", error);
            }
        }

        function renderTabla(rows, tipo) {
            if (!rows.length) return `<p class="muted">No hubo movimientos.</p>`;

            if (tipo === "updated") {
                return `
                    <table class="sync-table">
                        <thead>
                            <tr>
                                <th>Matrícula</th>
                                <th>Jugador</th>
                                <th>Index viejo</th>
                                <th>Index nuevo</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows.map(p => `
                                <tr>
                                    <td>${escapeHtml(p.matricula)}</td>
                                    <td>${escapeHtml(p.nombre)}</td>
                                    <td><b>${escapeHtml(formatIndex(p.old_index))}</b></td>
                                    <td><b>${escapeHtml(formatIndex(p.new_index))}</b></td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                `;
            }

            if (tipo === "deactivated") {
                return `
                    <table class="sync-table">
                        <thead>
                            <tr>
                                <th>Matrícula</th>
                                <th>Jugador</th>
                                <th>Index anterior</th>
                                <th>Motivo</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rows.map(p => `
                                <tr>
                                    <td>${escapeHtml(p.matricula)}</td>
                                    <td>${escapeHtml(p.nombre)}</td>
                                    <td>${escapeHtml(formatIndex(p.old_index))}</td>
                                    <td>${escapeHtml(p.reason || "Dejó de ser miembro VMGC")}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                `;
            }

            return `
                <table class="sync-table">
                    <thead>
                        <tr>
                            <th>Matrícula</th>
                            <th>Jugador</th>
                            <th>Index</th>
                            <th>Club</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.map(p => `
                            <tr>
                                <td>${escapeHtml(p.matricula)}</td>
                                <td>${escapeHtml(p.nombre)}</td>
                                <td>${escapeHtml(formatIndex(p.index))}</td>
                                <td>${escapeHtml(p.club || "Villa María Golf Club")}</td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            `;
        }

        function renderDetalleSync(changes) {
            const box = document.getElementById("detalleSync");
            if (!box) return;

            const totals = changes.totals || {};

            box.innerHTML = `
                <p><b>Resumen de la última sincronización VMGC 408</b></p>

                <div class="summary-grid">
                    <div class="summary-box">
                        <span>Altas nuevas</span>
                        <b>${changes.added.length}</b>
                    </div>
                    <div class="summary-box">
                        <span>Cambios de index</span>
                        <b>${changes.updated.length}</b>
                    </div>
                    <div class="summary-box">
                        <span>Bajas VMGC</span>
                        <b>${changes.deactivated.length}</b>
                    </div>
                </div>

                <p class="muted">
                    Miembros VMGC antes: <b>${totals.before_vmgc ?? "—"}</b> ·
                    Miembros VMGC después: <b>${totals.after_vmgc ?? "—"}</b>
                    ${totals.total_received != null ? ` · Total recibido AAG: <b>${escapeHtml(totals.total_received)}</b>` : ""}
                    ${totals.total_filtered != null ? ` · Filtrados VMGC: <b>${escapeHtml(totals.total_filtered)}</b>` : ""}
                    ${totals.total_upserted != null ? ` · Upsert en players: <b>${escapeHtml(totals.total_upserted)}</b>` : ""}
                </p>

                <h3><span class="badge badge-index">CAMBIOS DE INDEX</span></h3>
                ${renderTabla(changes.updated, "updated")}
            `;
        }

        function imprimirReporteSyncA4() {
            if (!ultimoReporteSync) {
                alert("Primero tenés que hacer una sincronización.");
                return;
            }

            document.body.classList.add("imprimiendo-sync");

            setTimeout(() => {
                window.print();
                document.body.classList.remove("imprimiendo-sync");
            }, 100);
        }

        btnSync.addEventListener("click", iniciarSyncConRevisionAAG);

        async function buscarJugadores() {
            const qRaw = buscadorJugador.value.trim();

            if (qRaw.length < 2) {
                resultadosBusqueda.innerHTML =
                    `<div class="empty">Escribí al menos 2 caracteres.</div>`;
                return;
            }

            try {
                resultadosBusqueda.innerHTML =
                    `<div class="empty">Buscando jugadores...</div>`;

                const q = normalizarTexto(qRaw).replace(/\s+/g, "%");

                const { data: playersData, error: playersError } = await supabase
                    .from("players")
                    .select(`
                        id,
                        first_name,
                        last_name,
                        full_name,
                        gender,
                        current_index,
                        aag_member_number,
                        country,
                        club_name,
                        is_club_member,
                        is_aag_active,
                        option_club_id,
                        source,
                        search_text
                    `)
                    .ilike("search_text", `%${q}%`)
                    .limit(15);

                if (playersError) throw playersError;

                const playerClubIds = [
                    ...new Set(
                        (playersData || [])
                            .map(p => p.option_club_id)
                            .filter(Boolean)
                            .map(Number)
                    )
                ];

                let playersClubsMap = {};

                if (playerClubIds.length) {
                    const { data: playerClubsData, error: playerClubsError } =
                        await supabase
                            .from("aag_clubs")
                            .select(`option_club_id, city, province`)
                            .in("option_club_id", playerClubIds);

                    if (playerClubsError) throw playerClubsError;

                    playersClubsMap = Object.fromEntries(
                        (playerClubsData || []).map(c => [
                            Number(c.option_club_id),
                            c
                        ])
                    );
                }

                const { data: aagData, error: aagError } = await supabase
                    .from("aag_enrolleds")
                    .select(`
                        enrollment_number,
                        first_name,
                        last_name,
                        full_name,
                        gender,
                        current_index,
                        option_club_id,
                        club_name,
                        search_text
                    `)
                    .ilike("search_text", `%${q}%`)
                    .limit(15);

                if (aagError) throw aagError;

                const clubIds = [
                    ...new Set(
                        (aagData || [])
                            .map(p => p.option_club_id)
                            .filter(Boolean)
                            .map(Number)
                    )
                ];

                let clubsMap = {};

                if (clubIds.length) {
                    const { data: clubsData, error: clubsError } = await supabase
                        .from("aag_clubs")
                        .select(`option_club_id, city, province`)
                        .in("option_club_id", clubIds);

                    if (clubsError) throw clubsError;

                    clubsMap = Object.fromEntries(
                        (clubsData || []).map(c => [
                            Number(c.option_club_id),
                            c
                        ])
                    );
                }

                const players = (playersData || []).map(p => {
                    const clubInfo =
                        playersClubsMap[Number(p.option_club_id)] || {};

                    return {
                        ...p,
                        club_city: clubInfo.city || "",
                        club_province: clubInfo.province || "",
                        origen_busqueda: "players"
                    };
                });

                const yaEstanEnPlayers = new Set(
                    players.map(p => String(p.aag_member_number || ""))
                );

                const externos = (aagData || [])
                    .filter(p => !yaEstanEnPlayers.has(String(p.enrollment_number || "")))
                    .map(p => {
                        const clubInfo =
                            clubsMap[Number(p.option_club_id)] || {};

                        return {
                            id: `aag:${p.enrollment_number}`,
                            origen_busqueda: "aag_enrolleds",
                            enrollment_number: p.enrollment_number,
                            aag_member_number: p.enrollment_number,
                            first_name: p.first_name,
                            last_name: p.last_name,
                            full_name: p.full_name,
                            gender: p.gender,
                            current_index: p.current_index,
                            option_club_id: p.option_club_id,
                            club_name: p.club_name,
                            club_city: clubInfo.city || "",
                            club_province: clubInfo.province || "",
                            country: "Argentina",
                            is_club_member: Number(p.option_club_id) === VMGC_CLUB_ID
                        };
                    });

                function scoreJugador(p) {
                    const buscado = normalizarTexto(qRaw);
                    const partes = buscado.split(" ").filter(Boolean);

                    const nombre = normalizarTexto(
                        `${p.full_name || ""} ${p.last_name || ""} ${p.first_name || ""} ${p.aag_member_number || p.enrollment_number || ""}`
                    );

                    let score = 0;

                    if (Number(p.option_club_id) === VMGC_CLUB_ID || p.is_club_member === true) score += 10000;
                    if (String(p.aag_member_number || p.enrollment_number || "") === qRaw) score += 8000;
                    if (nombre.includes(buscado)) score += 4000;
                    if (partes.every(parte => nombre.includes(parte))) score += 2500;
                    score += partes.filter(parte => nombre.includes(parte)).length * 500;

                    return score;
                }

                ultimosResultados = [...players, ...externos]
                    .map(p => ({ ...p, _score: scoreJugador(p) }))
                    .sort((a, b) => b._score - a._score)
                    .slice(0, 8);

                renderResultadosBusqueda();

            } catch (error) {
                console.error(error);
                resultadosBusqueda.innerHTML =
                    `<div class="empty">Error: ${escapeHtml(error.message || error)}</div>`;
            }
        }

        function renderResultadosBusqueda() {
            if (!ultimosResultados.length) {
                resultadosBusqueda.innerHTML =
                    `<div class="empty">No se encontraron jugadores.</div>`;
                return;
            }

            resultadosBusqueda.innerHTML = `
                <div class="search-results">
                    ${ultimosResultados.map((p, idx) => `
                        <div class="player-card" data-player-idx="${idx}">
                            <div class="player-name">${escapeHtml(nombreDesdePlayer(p))}</div>
                            <div class="player-extra">
                                Matrícula: ${escapeHtml(p.aag_member_number || "—")}
                                · Index: ${escapeHtml(formatIndex(p.current_index))}
                                · Club: ${escapeHtml(p.club_name || "—")}
                                · ${origenTexto(p)}
                            </div>
                        </div>
                    `).join("")}
                </div>

                <div id="detalleJugador"></div>
            `;

            resultadosBusqueda.querySelectorAll("[data-player-idx]").forEach(card => {
                card.addEventListener("click", () => {
                    resultadosBusqueda
                        .querySelectorAll(".player-card")
                        .forEach(c => c.classList.remove("active"));

                    card.classList.add("active");

                    const p = ultimosResultados[Number(card.dataset.playerIdx)];
                    renderDetalleJugador(p);
                });
            });
        }

        function renderDetalleJugador(p) {
            const detalle = document.getElementById("detalleJugador");
            if (!detalle || !p) return;

            detalle.innerHTML = `
                <div class="player-detail">
                    <b>${escapeHtml(nombreDesdePlayer(p))}</b><br><br>

                    Matrícula AAG: <b>${escapeHtml(p.aag_member_number || "—")}</b><br>
                    Index actual: <b>${escapeHtml(formatIndex(p.current_index))}</b><br>
                    Género: <b>${escapeHtml(generoTexto(p.gender))}</b><br>
                    Club: <b>${escapeHtml(p.club_name || "—")}</b><br>
                    Club ID: <b>${escapeHtml(p.option_club_id || "—")}</b><br>
                    Miembro VMGC: <b>${esVMGC(p) ? "Sí" : "No"}</b><br>
                    Activo AAG: <b>${p.is_aag_active === false ? "No" : "Sí"}</b><br>
                    Localidad: <b>${escapeHtml(p.club_city || "—")}</b><br>
                    Provincia: <b>${escapeHtml(p.club_province || "—")}</b><br>
                </div>
            `;
        }

        buscadorJugador.addEventListener("input", () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(buscarJugadores, 350);
        });

        buscadorJugador.addEventListener("keydown", (e) => {
            if (e.key === "Enter") buscarJugadores();
        });

        btnImprimirSync.addEventListener("click", imprimirReporteSyncA4);

        document.getElementById("btnHome")?.addEventListener("click", () => {
            window.location.href = "panel.html";
        });
    </script>
