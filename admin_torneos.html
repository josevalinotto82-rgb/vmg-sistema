<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Crear Torneo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f5f8f3;
      color: #1f2937;
    }

    h1 {
      margin-bottom: 6px;
    }

    .sub {
      color: #6b7280;
      margin-bottom: 18px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      margin-bottom: 18px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
    }

    .toolbar button {
      background: #166534;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }

    .toolbar button:hover {
      background: #166534;
    }

    .toolbar button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .toolbar button.secondary:hover {
      background: #d1d5db;
    }

    .muted {
      color: #6b7280;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
    }

    .ok {
      color: #166534;
      font-weight: bold;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 14px;
      font-weight: 700;
    }

    .field input,
    .field select {
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
    }

    .section-title {
      margin: 0 0 12px 0;
      font-size: 18px;
    }

    .bis-holes-grid {
      display: grid;
      grid-template-columns: repeat(9, minmax(30px, 1fr));
      gap: 10px;
    }

    .bis-hole-btn {
      position: relative;
      height: 64px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      font-weight: 700;
      font-size: 22px;
      color: #1f2937;
    }

    .bis-hole-btn:hover {
      background: #f9fafb;
    }

    .bis-hole-btn.active {
      border-color: #166534;
      box-shadow: inset 0 0 0 1px #166534;
    }

    .bis-hole-main {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .bis-hole-mark {
      position: absolute;
      top: 6px;
      font-size: 11px;
      font-weight: 700;
      color: #166534;
      background: #ecfdf5;
      border-radius: 999px;
      min-width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .bis-hole-mark.left {
      left: 6px;
    }

    .bis-hole-mark.right {
      right: 6px;
    }

    .btn-status {
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-status-open {
      background: #166534;
      color: white;
    }

    .btn-status-closed {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-danger {
      background: #b91c1c;
      color: white;
      border: none;
      padding: 8px 10px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    .modal-confirm {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal-confirm.hidden {
      display: none;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 12px;
      min-width: 300px;
      text-align: center;
    }

    .modal-actions {
      margin-top: 15px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
      border: none;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-action {
      border: none;
      padding: 8px 10px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-open {
      background: #0841bb;
      color: white;
    }

    .btn-grid {
      background: #e7b067;
      color: white;
    }

    /* ===== TABLA TORNEOS ===== */
    .tabla-torneos {
      border-collapse: separate;
      border-spacing: 60px 4px;
      /* 👈 espacio horizontal y vertical */
      width: auto;
      /* 👈 NO ocupa todo el ancho */
    }

    .tabla-torneos td,
    .tabla-torneos th {
      text-align: left;
      padding: 0;
      /* usamos spacing, no padding */
    }

    /* ===== TABLA GRILLA ===== */
    .tabla-grilla {
      border-collapse: separate;
      border-spacing: 40px 1px;
      /* 👈 más compacta */
      width: auto;
    }

    .tabla-grilla td,
    .tabla-grilla th {
      text-align: center;
      padding: 0;
    }

    .tabla-torneos td:first-child {
      font-weight: bold;
    }

    .home-btn {
      position: fixed;
      top: 30px;
      right: 27px;
      width: 38px;
      height: 38px;
      border-radius: 6px;
      background: #166534;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
      z-index: 9999;
      transition: transform 0.15s, background 0.15s;
    }

    .home-btn:hover {
      background: #166534;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="home-btn" id="btnHome" title="Volver al panel">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M3 10L12 3L21 10V20C21 20.55 20.55 21 20 21H4C3.45 21 3 20.55 3 20V10Z" stroke="white"
        stroke-width="2" />
    </svg>
  </div>

  <h1>Crear Torneo</h1>
  <div class="sub">Alta de torneo y generación automática de grilla</div>

  <div class="card">
    <h2 class="section-title">Datos del torneo</h2>

    <div class="form-grid">
      <div class="field">
        <label for="nombre">Nombre</label>
        <input id="nombre" />
      </div>

      <div class="field">
        <label for="fecha">Fecha</label>
        <input id="fecha" type="date" />
      </div>

      <div class="field">
        <label for="modalidad">Modalidad</label>
        <select id="modalidad"></select>
      </div>

      <div class="field">
        <label for="categorias">Categorías del torneo</label>
        <select id="categorias" multiple size="6"></select>
      </div>

      <div class="field">
        <label for="tipoSalida">Tipo de salida</label>
        <select id="tipoSalida">
          <option value="secuencial">Secuencial</option>
          <option value="simultanea">Simultánea</option>
        </select>
      </div>

      <div class="field">
        <label for="segmentoJuego">Juego</label>
        <select id="segmentoJuego">
          <option value="18" selected>18 hoyos</option>
          <option value="front9">9 Ida</option>
          <option value="back9">9 Vta.</option>
        </select>
      </div>
      <div class="field">
        <label for="usaSerie">Serie</label>
        <select id="usaSerie">
          <option value="no">Torneo individual</option>
          <option value="nueva">Crear nueva serie</option>
          <option value="existente">Vincular a serie existente</option>
        </select>
      </div>

      <div class="field" id="campoSerieExistente" style="display:none;">
        <label for="serieSelect">Seleccionar serie</label>
        <select id="serieSelect"></select>
      </div>

      <div class="field" id="campoSerieNueva" style="display:none;">
        <label for="serieNombre">Nombre nueva serie</label>
        <input id="serieNombre" placeholder="Ej: Campeonato 54 hoyos" />
      </div>

      <div class="field" id="campoSerieCantidadFechas" style="display:none;">
        <label for="serieRequiredRounds">Cantidad total de fechas</label>
        <input id="serieRequiredRounds" type="number" min="1" value="3" />
      </div>

      <div class="field" id="campoRonda" style="display:none;">
        <label for="serieRonda">Esta es la fecha Nº</label>
        <input id="serieRonda" type="number" min="1" />
      </div>
    </div>
  </div>

  <div class="card">
    <h2 class="section-title">Configuración de salidas</h2>

    <!-- SECUENCIAL -->
    <div id="configSecuencial" class="form-grid">
      <div class="field">
        <label>Bloque 1 - Hoyo 1</label>
        <input value="Hoyo 1" disabled />
      </div>

      <div class="field">
        <label for="horaInicioB1A">Bloque 1 - Inicio tanda 1</label>
        <input id="horaInicioB1A" type="time" />
      </div>

      <div class="field">
        <label for="lineasB1A">Bloque 1 - Líneas tanda 1</label>
        <input id="lineasB1A" type="number" min="0" value="0" />
      </div>

      <div class="field">
        <label for="horaInicioB1B">Bloque 1 - Inicio tanda 2</label>
        <input id="horaInicioB1B" type="time" />
      </div>

      <div class="field">
        <label for="lineasB1B">Bloque 1 - Líneas tanda 2</label>
        <input id="lineasB1B" type="number" min="0" value="0" />
      </div>

      <div class="field">
        <label>Bloque 2 - Hoyo 10</label>
        <input value="Hoyo 10" disabled />
      </div>

      <div class="field">
        <label for="horaInicioB2A">Bloque 2 - Inicio tanda 1</label>
        <input id="horaInicioB2A" type="time" />
      </div>

      <div class="field">
        <label for="lineasB2A">Bloque 2 - Líneas tanda 1</label>
        <input id="lineasB2A" type="number" min="0" value="0" />
      </div>

      <div class="field">
        <label for="horaInicioB2B">Bloque 2 - Inicio tanda 2</label>
        <input id="horaInicioB2B" type="time" />
      </div>

      <div class="field">
        <label for="lineasB2B">Bloque 2 - Líneas tanda 2</label>
        <input id="lineasB2B" type="number" min="0" value="0" />
      </div>

      <div class="field">
        <label for="intervalo">Intervalo (minutos)</label>
        <input id="intervalo" type="number" min="1" value="10" />
      </div>
    </div>

    <!-- SIMULTÁNEA -->
    <div id="configSimultanea" class="form-grid" style="display: none;">
      <div class="field">
        <label for="horaSimultanea1">Hora simultánea 1</label>
        <input id="horaSimultanea1" type="time" />
      </div>

      <div class="field">
        <label for="horaSimultanea2">Hora simultánea 2</label>
        <input id="horaSimultanea2" type="time" />
      </div>

      <div class="field" style="grid-column: 1 / -1;">
        <label>Salidas BIS por hoyo</label>
        <div class="muted" style="margin-bottom: 8px;">
          Tocá cada hoyo para alternar BIS: horario 1, horario 1 y 2, horario 2, desactivado.
        </div>
        <div id="bisHolesGrid" class="bis-holes-grid"></div>
      </div>
    </div>

    <div class="toolbar" style="margin-top: 16px;">
      <button id="crear">Guardar Torneo</button>
    </div>

    <div id="estado" class="muted" style="margin-top: 14px;"></div>
  </div>

  <div class="card">
    <h2 class="section-title">Torneos creados</h2>

    <select id="filtroEstado">
      <option value="todos">Todos</option>
      <option value="open">Abiertos</option>
      <option value="closed">Cerrados</option>
    </select>

    <table class="tabla-torneos">
      <tbody id="torneosLista"></tbody>
    </table>
  </div>

  <div class="card">
    <h2 class="section-title">Grilla del torneo</h2>

    <table class="tabla-grilla">
      <thead>
        <tr>
          <th>Bloque</th>
          <th>Hora</th>
          <th>Hoyo</th>
          <th>Capacidad</th>
        </tr>
      </thead>
      <tbody id="grilla"></tbody>
    </table>
  </div>

  <div id="modalConfirm" class="modal-confirm hidden">
    <div class="modal-content">
      <p id="modalConfirmText">¿Confirmar acción?</p>
      <div class="modal-actions">
        <button id="btnConfirmOk" class="btn-danger">Confirmar</button>
        <button id="btnConfirmCancel" class="btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>


  <script type="module">

    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://bnnfolhrqxgxjmobclrm.supabase.co",
      "sb_publishable_pNxU4AFpAZPpeJ0wICLvIw_6nW90njQ"
    );

    async function exigirAdmin() {
      const { data: { session } } = await supabase.auth.getSession();

      if (!session) {
        window.location.href = "login.html";
        throw new Error("Sin sesión");
      }

      const { data: profile, error } = await supabase
        .from("profiles")
        .select("role, active")
        .eq("id", session.user.id)
        .maybeSingle();

      if (error || !profile || profile.active !== true || profile.role !== "admin") {
        alert("No tenés permiso para entrar a esta página.");
        window.location.href = "panel.html";
        throw new Error("Sin permiso admin");
      }

      return session.user;
    }

    await exigirAdmin();

    const torneosListaEl = document.getElementById("torneosLista");

    const tipoSalidaEl = document.getElementById("tipoSalida");
    const configSecuencialEl = document.getElementById("configSecuencial");
    const configSimultaneaEl = document.getElementById("configSimultanea");
    const bisHolesGridEl = document.getElementById("bisHolesGrid");

    const modalidadEl = document.getElementById("modalidad");
    const categoriasEl = document.getElementById("categorias");
    const estado = document.getElementById("estado");

    const usaSerieEl = document.getElementById("usaSerie");
    const serieSelectEl = document.getElementById("serieSelect");

    const params = new URLSearchParams(window.location.search);
    const torneoIdEdicion = params.get("torneo_id");

    const grillaEl = document.getElementById("grilla");

    async function cargarTorneos() {
      const filtro = document.getElementById("filtroEstado").value;

      let query = supabase
        .from("tournaments")
        .select("id, name, tournament_date, status")
        .order("tournament_date", { ascending: true });

      if (filtro === "todos") {
        query = query.in("status", ["open", "closed"]); // 👈 SOLO estos dos
      } else {
        query = query.eq("status", filtro);
      }

      const { data, error } = await query;

      document.getElementById("filtroEstado").addEventListener("change", () => {
        cargarTorneos();
      });

      torneosListaEl.innerHTML = (data || [])
        .map(t => {
          const fecha = String(t.tournament_date || "").split("-").reverse().join("/");

          return `
            <tr>
              <td>${t.name}</td>
              <td>${fecha}</td>
              <td>
                <button class="btn-action btn-open" onclick="abrirTorneo('${t.id}')">
                  Editar
                </button>
                <button class="btn-action btn-grid" onclick="verGrilla('${t.id}')">
                  Ver Grilla
                </button>
                <button
                  class="btn-status ${String(t.status || "draft").toLowerCase() === "open" ? "btn-status-open" : "btn-status-closed"}"
                  onclick="toggleInscripcion('${t.id}', '${String(t.status || "draft").toLowerCase()}')"
                >
                  ${String(t.status || "draft").toLowerCase() === "open" ? "Abierto" : "Cerrado"}
                </button>
                <button class="btn-danger" onclick="eliminarTorneo('${t.id}', '${String(t.name).replace(/'/g, "\\'")}')">
                  Eliminar
                </button>
              </td>
            </tr>
          `;
        })
        .join("");
    }

    function volverPanel() {
      window.location.href = "panel.html";
    }

    function mostrarConfirmacion(texto) {
      return new Promise((resolve) => {
        const modal = document.getElementById("modalConfirm");
        const textEl = document.getElementById("modalConfirmText");
        const btnOk = document.getElementById("btnConfirmOk");
        const btnCancel = document.getElementById("btnConfirmCancel");

        textEl.textContent = texto;
        modal.classList.remove("hidden");

        function cerrar(resultado) {
          modal.classList.add("hidden");
          btnOk.removeEventListener("click", onOk);
          btnCancel.removeEventListener("click", onCancel);
          resolve(resultado);
        }

        function onOk() {
          cerrar(true);
        }

        function onCancel() {
          cerrar(false);
        }

        btnOk.addEventListener("click", onOk);
        btnCancel.addEventListener("click", onCancel);
      });
    }

    function minutosDesdeHora(horaTexto) {
      const [hh, mm] = String(horaTexto || "00:00").split(":").map(Number);
      return (hh * 60) + mm;
    }

    function separarTandasPorIntervalo(lineas, intervalo) {
      const horas = (lineas || [])
        .map(l => String(l.line_time || "").slice(0, 5))
        .filter(Boolean);

      if (horas.length === 0) {
        return {
          tanda1: [],
          tanda2: []
        };
      }

      let indiceCorte = -1;

      for (let i = 1; i < horas.length; i++) {
        const anterior = minutosDesdeHora(horas[i - 1]);
        const actual = minutosDesdeHora(horas[i]);
        const diferencia = actual - anterior;

        if (diferencia > intervalo) {
          indiceCorte = i;
          break;
        }
      }

      if (indiceCorte === -1) {
        return {
          tanda1: horas,
          tanda2: []
        };
      }

      return {
        tanda1: horas.slice(0, indiceCorte),
        tanda2: horas.slice(indiceCorte)
      };
    }

    async function cargarTorneoEnEdicion() {
      if (!torneoIdEdicion) return;

      const { data: torneo, error } = await supabase
        .from("tournaments")
        .select(`
        id,
        name,
        tournament_date,
        game_mode_id,
        start_type,
        hole_count,
        series_id,
        series_round_number,
        tournament_categories (
          name,
          index_min,
          index_max,
          gender,
          tee_id,
          display_order,
          hole_segment,
          slope,
          course_rating,
          par
        )
      `)
        .eq("id", torneoIdEdicion)
        .maybeSingle();

      console.log("DEBUG torneo edición", { torneoIdEdicion, torneo, error });

      if (error) {
        console.error("Error cargando torneo en edición:", error);
        return;
      }

      if (!torneo) {
        console.warn("No se encontró torneo para edición:", torneoIdEdicion);
        return;
      }

      // Datos base
      const segmentoJuegoEl = document.getElementById("segmentoJuego");

      document.getElementById("nombre").value = torneo.name || "";
      document.getElementById("fecha").value = torneo.tournament_date || "";
      modalidadEl.value = torneo.game_mode_id || "";
      tipoSalidaEl.value = torneo.start_type || "secuencial";
      actualizarVisibilidadTipoSalida();
      document.getElementById("crear").textContent = "Actualizar Torneo";

      if (torneo.series_id) {
        usaSerieEl.value = "existente";
        serieSelectEl.value = torneo.series_id;
        document.getElementById("serieRonda").value = torneo.series_round_number || "";
      } else {
        usaSerieEl.value = "no";
        document.getElementById("serieRonda").value = "";
      }
      actualizarCamposSerie();

      // Marcar categorías seleccionadas
      const categoriasDelTorneo = torneo.tournament_categories || [];

      let segmentoDetectado = "18";

      if (categoriasDelTorneo.length > 0 && categoriasDelTorneo[0].hole_segment) {
        segmentoDetectado = categoriasDelTorneo[0].hole_segment;
      } else if (Number(torneo.hole_count) === 9) {
        segmentoDetectado = "front9";
      }

      segmentoJuegoEl.value = segmentoDetectado;

      Array.from(categoriasEl.options).forEach(opt => {
        const catBase = window.categoriasBase[Number(opt.value)];
        if (!catBase) return;

        const match = categoriasDelTorneo.find(c =>
          c.name === catBase.name &&
          c.index_min === catBase.index_min &&
          c.index_max === catBase.index_max &&
          c.gender === catBase.gender &&
          c.tee_id === catBase.tee_id
        );

        opt.selected = !!match;
      });

      // Cargar bloques
      const { data: blocks, error: errorBlocks } = await supabase
        .from("starting_blocks")
        .select("id, name, start_time, display_order")
        .eq("tournament_id", torneoIdEdicion)
        .order("display_order", { ascending: true });

      if (errorBlocks) {
        console.error("Error cargando bloques:", errorBlocks);
        return;
      }

      const blocksSafe = blocks || [];

      // Resetear BIS siempre
      inicializarBisSimultanea();
      renderBisHoles();

      // =========================
      // TORNEO SIMULTÁNEO
      // =========================
      if ((torneo.start_type || "secuencial") === "simultanea") {
        const horasSimultaneasCargadas = blocksSafe
          .map(b => (b.start_time || "").slice(0, 5))
          .filter(Boolean)
          .join(",");

        const horasArray = horasSimultaneasCargadas
          .split(",")
          .map(h => h.trim())
          .filter(Boolean);

        document.getElementById("horaSimultanea1").value = horasArray[0] || "";
        document.getElementById("horaSimultanea2").value = horasArray[1] || "";

        const bloquesOrdenados = blocksSafe.slice().sort((a, b) => a.display_order - b.display_order);

        for (let i = 0; i < bloquesOrdenados.length; i++) {
          const bloque = bloquesOrdenados[i];

          const { data: lineasBloque, error: errorLineasBloque } = await supabase
            .from("starting_lines")
            .select("starting_hole, label")
            .eq("starting_block_id", bloque.id);

          if (errorLineasBloque) {
            console.error("Error cargando BIS del bloque:", errorLineasBloque);
            continue;
          }

          const esHorario1 = i === 0;
          const esHorario2 = i === 1;

          (lineasBloque || []).forEach(l => {
            if (l.label && l.label.includes("BIS")) {
              const hoyo = Number(l.starting_hole);

              if (!window.bisSimultanea[hoyo]) {
                window.bisSimultanea[hoyo] = { h1: false, h2: false };
              }

              if (esHorario1) window.bisSimultanea[hoyo].h1 = true;

            .from("starting_lines")

    window.bisSimultanea = {};

    function inicializarBisSimultanea() {
      window.bisSimultanea = {};
      for (let hoyo = 1; hoyo <= 18; hoyo++) {
        window.bisSimultanea[hoyo] = { h1: false, h2: false };
      }
    }

    function estadoBisToModo(estado) {
      if (estado.h1 && estado.h2) return 2;
      if (estado.h1 && !estado.h2) return 1;
      if (!estado.h1 && estado.h2) return 3;
      return 0;
    }

    function modoToEstadoBis(modo) {
      if (modo === 1) return { h1: true, h2: false };
      if (modo === 2) return { h1: true, h2: true };
      if (modo === 3) return { h1: false, h2: true };
      return { h1: false, h2: false };
    }

    function toggleBisHole(hoyo) {
      const actual = window.bisSimultanea[hoyo] || { h1: false, h2: false };
      const modoActual = estadoBisToModo(actual);
      const siguienteModo = (modoActual + 1) % 4;
      window.bisSimultanea[hoyo] = modoToEstadoBis(siguienteModo);
      renderBisHoles();
    }

    function renderBisHoles() {
      if (!bisHolesGridEl) return;

      bisHolesGridEl.innerHTML = "";

      for (let hoyo = 1; hoyo <= 18; hoyo++) {
        const estado = window.bisSimultanea[hoyo] || { h1: false, h2: false };
        const activo = estado.h1 || estado.h2;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `bis-hole-btn ${activo ? "active" : ""}`;
        btn.innerHTML = `
      ${estado.h1 ? `<span class="bis-hole-mark left">1</span>` : ""}
      ${estado.h2 ? `<span class="bis-hole-mark right">2</span>` : ""}
      <span class="bis-hole-main">${hoyo}</span>
    `;
        btn.addEventListener("click", () => toggleBisHole(hoyo));

        bisHolesGridEl.appendChild(btn);
      }
    }

    async function cargarGrilla() {
      if (!torneoIdEdicion) return;

      const { data, error } = await supabase
        .from("starting_lines")
        .select(`
          id,
          line_time,
          starting_hole,
          label,
          capacity,
          starting_blocks!inner (
            name,
            display_order
          )
        `)
        .eq("starting_blocks.tournament_id", torneoIdEdicion)
        .order("line_time", { ascending: true });

      if (error) {
        console.error("Error cargando grilla:", error);
        return;
      }

      const lineasOrdenadas = (data || []).slice().sort((a, b) => {
        const bloqueA = Number(a.starting_blocks?.display_order || 0);
        const bloqueB = Number(b.starting_blocks?.display_order || 0);
        if (bloqueA !== bloqueB) return bloqueA - bloqueB;

        const horaA = String(a.line_time || "");
        const horaB = String(b.line_time || "");
        if (horaA !== horaB) return horaA.localeCompare(horaB);

        const hoyoA = Number(a.starting_hole || 0);
        const hoyoB = Number(b.starting_hole || 0);
        if (hoyoA !== hoyoB) return hoyoA - hoyoB;

        const esBisA = String(a.label || "").includes("BIS") ? 1 : 0;
        const esBisB = String(b.label || "").includes("BIS") ? 1 : 0;
        return esBisA - esBisB;
      });

      grillaEl.innerHTML = lineasOrdenadas
        .map(l => {
          return `
        <tr>
          <td>${l.starting_blocks?.name || ""}</td>
          <td>${l.line_time}</td>
          <td>${l.label || `Hoyo ${l.starting_hole}`}</td>
          <td>${l.capacity}</td>
        </tr>
      `;
        })
        .join("");
    }

    document.getElementById("crear").addEventListener("click", async () => {
      const nombre = document.getElementById("nombre").value.trim();
      const fecha = document.getElementById("fecha").value;
      const modalidad = modalidadEl.value;

      const horaInicioB1A = document.getElementById("horaInicioB1A").value;
      const lineasB1A = Number(document.getElementById("lineasB1A").value || 0);

      const horaInicioB1B = document.getElementById("horaInicioB1B").value;

      const horaInicioB2A = document.getElementById("horaInicioB2A").value;
      const lineasB2A = Number(document.getElementById("lineasB2A").value || 0);

      const horaInicioB2B = document.getElementById("horaInicioB2B").value;
      const lineasB2B = Number(document.getElementById("lineasB2B").value || 0);

      const intervalo = Number(document.getElementById("intervalo").value);

      const tipoSalida = tipoSalidaEl.value;
      const segmentoJuego = document.getElementById("segmentoJuego").value || "18";

      const horaSimultanea1 = document.getElementById("horaSimultanea1").value;
      const horaSimultanea2 = document.getElementById("horaSimultanea2").value;

      const horasSimultaneas = [horaSimultanea1, horaSimultanea2].filter(Boolean);
      const holeCount = segmentoJuego === "18" ? 18 : 9;

      const categoriasSeleccionadasBase = Array.from(categoriasEl.selectedOptions)

      function setError(msg) {

      function setOk(msg) {

      let series_id = null;
      let series_round_number = null;

      function claveCategoria(c) {
        return [
          c.name ?? "",
          c.index_min ?? "",
          c.index_max ?? "",
          c.gender ?? "",
          c.tee_id ?? ""
        ].join("|");
      }

      function sumarMinutos(horaTexto, minutos) {
        const fecha = new Date(`1970-01-01T${horaTexto}:00`);
        fecha.setMinutes(fecha.getMinutes() + minutos);
        return fecha.toTimeString().slice(0, 5);
      }

      function construirLineasDeseadasPorTandas({
        startingHole,
        horaA,
        cantidadA,
        horaB,
        cantidadB,
        intervalo
      }) {
        const lineas = [];

        if (horaA && cantidadA > 0) {
          for (let i = 0; i < cantidadA; i++) {
            lineas.push({
              line_time: sumarMinutos(horaA, i * intervalo),
              starting_hole: startingHole,
              label: `Hoyo ${startingHole}`,
              capacity: 4
            });
          }
        }

        if (horaB && cantidadB > 0) {
          for (let i = 0; i < cantidadB; i++) {
            lineas.push({
              line_time: sumarMinutos(horaB, i * intervalo),
              starting_hole: startingHole,
              label: `Hoyo ${startingHole}`,
              capacity: 4
            });
          }
        }

        return lineas;
      }

      async function crearSlotsParaLinea(startingLineId) {
        const slots = [1, 2, 3, 4].map((n) => ({
          starting_line_id: startingLineId,
          slot_number: n,
          participant_type: "self",
          display_name: ""
        }));

        const { error } = await supabase.from("line_slots").insert(slots);
        if (error) throw error;
      }

      async function obtenerReglasHandicapParaCategorias(categoriasBase, segmentoJuego) {
        const teeIds = [...new Set(categoriasBase.map(c => c.tee_id).filter(Boolean))];
        const genders = [...new Set(categoriasBase.map(c => c.gender).filter(Boolean))];

        if (teeIds.length === 0 || genders.length === 0) {
          return new Map();
        }

        const { data, error } = await supabase
          .from("tee_handicap_rules")
          .select("tee_id, gender, segment, slope, course_rating, par")
          .in("tee_id", teeIds)
          .in("gender", genders)
          .eq("segment", segmentoJuego);

        if (error) throw error;

        const mapa = new Map();

        for (const regla of (data || [])) {
          const clave = `${regla.tee_id}|${regla.gender}|${regla.segment}`;
          mapa.set(clave, regla);
        }

        return mapa;
      }

      async function syncCategorias(torneoId) {
        console.log("ENTRO A syncCategorias", torneoId);

        const { data: categoriasActuales, error: errorActuales } = await supabase
          .from("tournament_categories")
          .select("id, name, index_min, index_max, gender, tee_id, display_order, hole_segment, slope, course_rating, par")
          .eq("tournament_id", torneoId);

        if (errorActuales) throw errorActuales;

        const actualesOriginal = categoriasActuales || [];

        const mapa = new Map();

        for (const cat of actualesOriginal) {
          const clave = claveCategoria(cat);

          if (!mapa.has(clave)) {
            mapa.set(clave, cat);
          } else {
            await supabase
              .from("tournament_categories")
              .delete()
              .eq("id", cat.id);
          }
        }

        const actuales = Array.from(mapa.values());

        const clavesSeleccionadas = categoriasSeleccionadasBase.map(claveCategoria);
        const clavesActuales = actuales.map(claveCategoria);

        const idsABorrar = actuales
          .filter(c => !clavesSeleccionadas.includes(claveCategoria(c)))
          .map(c => c.id);

        if (idsABorrar.length > 0) {
          const { error } = await supabase
            .from("tournament_categories")
            .delete()
            .in("id", idsABorrar);

          if (error) throw error;
        }

        const reglasMap = await obtenerReglasHandicapParaCategorias(categoriasSeleccionadasBase, segmentoJuego);

        const categoriasAInsertar = categoriasSeleccionadasBase
          .filter(c => !clavesActuales.includes(claveCategoria(c)))
          .map(c => {
            const claveRegla = `${c.tee_id}|${c.gender}|${segmentoJuego}`;
            const regla = reglasMap.get(claveRegla);

            if (!regla) {
              throw new Error(
                `No existe tee_handicap_rule para tee_id=${c.tee_id}, gender=${c.gender}, segment=${segmentoJuego}`
              );
            }

            return {
              tournament_id: torneoId,
              name: c.name,
              index_min: c.index_min,
              index_max: c.index_max,
              gender: c.gender,
              tee_id: c.tee_id,
              display_order: c.display_order ?? 0,
              hole_segment: segmentoJuego,
              slope: regla.slope,
              course_rating: regla.course_rating,
              par: regla.par
            };
          });

        if (categoriasAInsertar.length > 0) {
          const { error } = await supabase
            .from("tournament_categories")
            .insert(categoriasAInsertar);

          if (error) throw error;
        }

        // También actualizar las existentes por si cambió el segmento
        for (const cat of actuales.filter(c => clavesSeleccionadas.includes(claveCategoria(c)))) {
          const base = categoriasSeleccionadasBase.find(c => claveCategoria(c) === claveCategoria(cat));
          if (!base) continue;

          const claveRegla = `${base.tee_id}|${base.gender}|${segmentoJuego}`;
          const regla = reglasMap.get(claveRegla);

          if (!regla) {
            throw new Error(
              `No existe tee_handicap_rule para tee_id=${base.tee_id}, gender=${base.gender}, segment=${segmentoJuego}`
            );
          }

          const { error } = await supabase
            .from("tournament_categories")
            .update({
              display_order: base.display_order ?? 0,
              hole_segment: segmentoJuego,
              slope: regla.slope,
              course_rating: regla.course_rating,
              par: regla.par
            })
            .eq("id", cat.id);

          if (error) throw error;
        }
      }

      async function cargarBloquesDelTorneo(torneoId) {
        const { data, error } = await supabase
          .from("starting_blocks")
          .select("id, name, start_time, display_order")
          .eq("tournament_id", torneoId)
          .order("display_order", { ascending: true });

        if (error) throw error;
        return data || [];
      }

      async function cargarLineasDeBloque(blockId) {
        const { data, error } = await supabase
          .from("starting_lines")
          .select("id, line_time, starting_hole, label, capacity, display_order")
          .eq("starting_block_id", blockId)
          .order("display_order", { ascending: true });

      async function lineaTieneJugadores(startingLineId) {
        const { data, error } = await supabase
          .from("line_slots")
          .select("id, display_name, linked_player_id")
          .eq("starting_line_id", startingLineId);

        if (error) throw error;

        return (data || []).some(s =>
          (s.display_name && s.display_name.trim() !== "") || s.linked_player_id
        );
      }

      async function borrarLineasSiVacias(lineas) {
        if (!lineas.length) return;

        for (const linea of lineas) {
          const ocupada = await lineaTieneJugadores(linea.id);
          if (ocupada) {
            throw new Error("No podés borrar líneas porque hay jugadores anotados.");
          }
        }

        const ids = lineas.map(l => l.id);

        const { error } = await supabase
          .from("starting_lines")
          .delete()
          .in("id", ids);

        if (error) throw error;
      }

      async function bloqueTieneJugadores(blockId) {
        const lineas = await cargarLineasDeBloque(blockId);

        for (const linea of lineas) {
          const ocupada = await lineaTieneJugadores(linea.id);
          if (ocupada) return true;
        }

        return false;
      }

      async function borrarBloqueSiVacio(blockId) {
        const ocupado = await bloqueTieneJugadores(blockId);
        if (ocupado) {
          throw new Error("No podés eliminar un bloque porque tiene jugadores anotados.");
        }

        const { error } = await supabase
          .from("starting_blocks")
          .delete()
          .eq("id", blockId);

        if (error) throw error;
      }

      async function upsertBloqueSecuencial(
        block,
        nombreBloque,
        ordenBloque,
        torneoId,
        startingHole,
        horaA,
        cantidadA,
        horaB,
        cantidadB
      ) {
        const deseadas = construirLineasDeseadasPorTandas({
          startingHole,
          horaA,
          cantidadA,
          horaB,
          cantidadB,
          intervalo
        });

        if (deseadas.length === 0) {
          if (block) {
            await borrarBloqueSiVacio(block.id);
          }
          return null;
        }

        let bloque = block;

        if (!bloque) {
          const { data, error } = await supabase
            .from("starting_blocks")
            .insert({
              tournament_id: torneoId,
              name: nombreBloque,
              start_time: `${deseadas[0].line_time}:00`,
              block_type: "sequential",
              display_order: ordenBloque
            })
            .select();

          console.log("DEBUG insert starting_blocks", data, error);

          if (error) throw error;

          if (!data || data.length === 0) {
            throw new Error("No se pudo crear el bloque.");
          }

          bloque = data[0];
        } else {
          const { error } = await supabase
            .from("starting_blocks")
            .update({
              name: nombreBloque,
              start_time: `${deseadas[0].line_time}:00`,
              display_order: ordenBloque
            })
            .eq("id", bloque.id);

          if (error) throw error;
        }

        const actuales = await cargarLineasDeBloque(bloque.id);

        for (let i = 0; i < deseadas.length; i++) {
          const deseada = deseadas[i];
          const actual = actuales[i];
          const displayOrder = i + 1;

          if (actual) {
            const { error } = await supabase
              .from("starting_lines")
              .update({
                line_time: deseada.line_time,
                starting_hole: deseada.starting_hole,
                label: deseada.label,
                capacity: deseada.capacity,
                display_order: displayOrder
              })
              .eq("id", actual.id);

            if (error) throw error;
          } else {
            const { data: nuevaLinea, error } = await supabase
              .from("starting_lines")
              .insert({
                starting_block_id: bloque.id,
                line_time: deseada.line_time,
                starting_hole: deseada.starting_hole,
                label: deseada.label,
                capacity: deseada.capacity,
                display_order: displayOrder
              })
              .select()
              .single();

            if (error) throw error;
            await crearSlotsParaLinea(nuevaLinea.id);
          }
        }

        const sobrantes = actuales.slice(deseadas.length);
        if (sobrantes.length > 0) {
          await borrarLineasSiVacias(sobrantes);
        }

        return bloque;
      }

      async function convertirATipoSecuencial(torneoId) {
        const bloques = await cargarBloquesDelTorneo(torneoId);

        for (const bloque of bloques) {
          const lineas = await cargarLineasDeBloque(bloque.id);
          const lineasBis = lineas.filter(l => String(l.label || "").includes("BIS"));
          if (lineasBis.length) {
            await borrarLineasSiVacias(lineasBis);
          }
        }
      }

      async function syncSecuencial(torneoId) {
        await convertirATipoSecuencial(torneoId);

        const bloques = await cargarBloquesDelTorneo(torneoId);
        const bloque1Actual = bloques[0] || null;
        const bloque2Actual = bloques[1] || null;

        await upsertBloqueSecuencial(
          bloque1Actual,
          "Bloque 1",
          1,
          torneoId,
          1,              // hoyo fijo
          horaInicioB1A,
          lineasB1A,
          horaInicioB1B,
          lineasB1B
        );

        await upsertBloqueSecuencial(
          bloque2Actual,
          "Bloque 2",
          2,
          torneoId,
          10,             // hoyo fijo
          horaInicioB2A,
          lineasB2A,
          horaInicioB2B,
          lineasB2B
        );

        const bloquesFinales = await cargarBloquesDelTorneo(torneoId);
        for (let i = 0; i < bloquesFinales.length; i++) {
          const { error } = await supabase
            .from("starting_blocks")
            .update({ display_order: i + 1 })
            .eq("id", bloquesFinales[i].id);

          if (error) throw error;
        }
      }

      async function crearLineasBaseSimultaneas(blockId, hora) {
        for (let hoyo = 1; hoyo <= 18; hoyo++) {
          const { data: nuevaLinea, error } = await supabase
            .from("starting_lines")
            .insert({
              starting_block_id: blockId,
              line_time: `${hora}:00`,
              starting_hole: hoyo,
              label: `Hoyo ${hoyo}`,
              capacity: 4,
              display_order: hoyo
            })
            .select()
            .single();

          if (error) throw error;
          await crearSlotsParaLinea(nuevaLinea.id);
        }
      }

      async function syncBisDeBloqueSimultaneo(blockId, hora, indiceHorario) {
        const { data: lineasBisExistentes, error } = await supabase
          .from("starting_lines")
          .select("id, starting_hole, label")
          .eq("starting_block_id", blockId)
          .ilike("label", "%BIS%");

        if (error) throw error;

        const bisExistentes = lineasBisExistentes || [];
        const hoyosDeseados = [];

        for (let hoyo = 1; hoyo <= 18; hoyo++) {
          const estado = window.bisSimultanea[hoyo] || { h1: false, h2: false };
          if (indiceHorario === 0 && estado.h1) hoyosDeseados.push(hoyo);
          if (indiceHorario === 1 && estado.h2) hoyosDeseados.push(hoyo);
        }

        const hoyosExistentes = bisExistentes.map(l => Number(l.starting_hole));

        const faltantes = hoyosDeseados.filter(h => !hoyosExistentes.includes(h));
        const sobrantes = bisExistentes.filter(l => !hoyosDeseados.includes(Number(l.starting_hole)));

        for (const hoyo of faltantes) {
          const { data: nuevaLineaBis, error: errorBis } = await supabase
            .from("starting_lines")
            .insert({
              starting_block_id: blockId,
              line_time: `${hora}:00`,
              starting_hole: hoyo,
              label: `Hoyo ${hoyo} BIS`,
              capacity: 4,
              display_order: hoyo + 100
            })
            .select()
            .single();

          if (errorBis) throw errorBis;
          await crearSlotsParaLinea(nuevaLineaBis.id);
        }

        if (sobrantes.length > 0) {
          await borrarLineasSiVacias(sobrantes);
        }
      }

      async function convertirATipoSimultanea(torneoId) {
        const bloques = await cargarBloquesDelTorneo(torneoId);

        for (const bloque of bloques) {
          const lineas = await cargarLineasDeBloque(bloque.id);
          const normales = lineas.filter(l => !String(l.label || "").includes("BIS"));

          const baseDeseada = [];
          for (let hoyo = 1; hoyo <= 18; hoyo++) {
            baseDeseada.push({
              starting_hole: hoyo,
              label: `Hoyo ${hoyo}`,
              line_time: (bloque.start_time || "").slice(0, 5),
              capacity: 4,
              display_order: hoyo
            });
          }

          for (let i = 0; i < baseDeseada.length; i++) {
            const deseada = baseDeseada[i];
            const actual = normales[i];

            if (actual) {
              const { error } = await supabase
                .from("starting_lines")
                .update({
                  starting_hole: deseada.starting_hole,
                  label: deseada.label,
                  line_time: deseada.line_time,
                  capacity: deseada.capacity,
                  display_order: deseada.display_order
                })
                .eq("id", actual.id);

              if (error) throw error;
            } else {
              const { data: nuevaLinea, error } = await supabase
                .from("starting_lines")
                .insert({
                  starting_block_id: bloque.id,
                  starting_hole: deseada.starting_hole,
                  label: deseada.label,
                  line_time: deseada.line_time,
                  capacity: deseada.capacity,
                  display_order: deseada.display_order
                })
                .select()
                .single();

              if (error) throw error;
              await crearSlotsParaLinea(nuevaLinea.id);
            }
          }

          const sobrantesNormales = normales.slice(18);
          if (sobrantesNormales.length > 0) {
            await borrarLineasSiVacias(sobrantesNormales);
          }
        }
      }

      async function syncSimultanea(torneoId) {
        const bloquesActuales = await cargarBloquesDelTorneo(torneoId);
        const horasDeseadas = horasSimultaneas.slice();

        const mapaPorHora = new Map(
          bloquesActuales.map(b => [String(b.start_time || "").slice(0, 5), b])
        );

        for (const bloque of bloquesActuales) {
          const horaBloque = String(bloque.start_time || "").slice(0, 5);
          if (!horasDeseadas.includes(horaBloque)) {
            await borrarBloqueSiVacio(bloque.id);
          }
        }

        let bloquesRefrescados = await cargarBloquesDelTorneo(torneoId);
        const mapaRefrescado = new Map(
          bloquesRefrescados.map(b => [String(b.start_time || "").slice(0, 5), b])
        );

        for (let i = 0; i < horasDeseadas.length; i++) {
          const hora = horasDeseadas[i];
          let bloque = mapaRefrescado.get(hora);

          if (!bloque) {
            const { data: nuevoBloque, error } = await supabase
              .from("starting_blocks")
              .insert({
                tournament_id: torneoId,
                name: `Simultánea ${hora}`,
                start_time: `${hora}:00`,
                block_type: "sequential",
                display_order: i + 1
              })
              .select()
              .single();

            if (error) throw error;

            bloque = nuevoBloque;
            await crearLineasBaseSimultaneas(bloque.id, hora);
          } else {
            const { error } = await supabase
              .from("starting_blocks")
              .update({
                name: `Simultánea ${hora}`,
                start_time: `${hora}:00`,
                display_order: i + 1
              })
              .eq("id", bloque.id);

            if (error) throw error;
          }
        }

        await convertirATipoSimultanea(torneoId);

        const bloquesFinales = await cargarBloquesDelTorneo(torneoId);
        for (let i = 0; i < bloquesFinales.length; i++) {
          const bloque = bloquesFinales[i];
          const hora = String(bloque.start_time || "").slice(0, 5);

          const { error } = await supabase
            .from("starting_blocks")
            .update({ display_order: i + 1 })
            .eq("id", bloque.id);

          if (error) throw error;

          await syncBisDeBloqueSimultaneo(bloque.id, hora, i);
        }
      }

      try {
        if (!nombre) {
          setError("Ingresá el nombre del torneo.");
          return;
        }

        if (!fecha) {
          setError("Ingresá la fecha del torneo.");
          return;
        }

        if (!modalidad) {
          setError("Seleccioná una modalidad.");
          return;
        }

        if (categoriasSeleccionadasBase.length === 0) {
          setError("Seleccioná al menos una categoría.");
          return;
        }

        if (tipoSalida === "secuencial") {
          if (!intervalo || intervalo <= 0) {
            setError("Ingresá un intervalo válido.");
            return;
          }

          const bloque1TieneAlgo =
            (horaInicioB1A && lineasB1A > 0) ||
            (horaInicioB1B && lineasB1B > 0);

          const bloque2TieneAlgo =
            (horaInicioB2A && lineasB2A > 0) ||
            (horaInicioB2B && lineasB2B > 0);

          if (!bloque1TieneAlgo && !bloque2TieneAlgo) {
            setError("Ingresá al menos una tanda en bloque 1 o bloque 2.");
            return;
          }

          if ((horaInicioB1A && lineasB1A <= 0) || (!horaInicioB1A && lineasB1A > 0)) {
            setError("Completá correctamente la tanda 1 del bloque 1.");
            return;
          }

          if ((horaInicioB1B && lineasB1B <= 0) || (!horaInicioB1B && lineasB1B > 0)) {
            setError("Completá correctamente la tanda 2 del bloque 1.");
            return;
          }

          if ((horaInicioB2A && lineasB2A <= 0) || (!horaInicioB2A && lineasB2A > 0)) {
            setError("Completá correctamente la tanda 1 del bloque 2.");
            return;
          }

          if ((horaInicioB2B && lineasB2B <= 0) || (!horaInicioB2B && lineasB2B > 0)) {
            setError("Completá correctamente la tanda 2 del bloque 2.");
            return;
          }
        }

        if (tipoSalida === "simultanea" && !horaSimultanea1) {
          setError("Ingresá al menos la hora simultánea 1.");
          return;
        }

        const tipoSerie = usaSerieEl ? usaSerieEl.value : "no";
        series_id = null;
        series_round_number = null;

        if (tipoSerie !== "no") {
          series_round_number = Number(document.getElementById("serieRonda").value || 0);

          if (!series_round_number || series_round_number <= 0) {
            setError("Ingresá el número de fecha dentro de la serie.");
            return;
          }

          if (tipoSerie === "nueva") {
            const nombreSerie = String(document.getElementById("serieNombre").value || "").trim();
            const requiredRounds = Number(document.getElementById("serieRequiredRounds").value || 0);

            if (!nombreSerie) {
              setError("Ingresá el nombre de la serie.");
              return;
            }

            if (!requiredRounds || requiredRounds <= 0) {
              setError("Ingresá la cantidad total de fechas de la serie.");
              return;
            }

            if (series_round_number > requiredRounds) {
              setError("La fecha Nº no puede ser mayor que la cantidad total de fechas.");
              return;
            }

            const { data: nuevaSerie, error } = await supabase
              .from("tournament_series")
              .insert({
                name: nombreSerie,
                description: "",
                required_rounds: requiredRounds,
                scoring_mode: "net",
                best18_enabled: true,
                status: "open"
              })
              .select("id")
              .single();

            if (error) throw error;
            series_id = nuevaSerie.id;
          }

          if (tipoSerie === "existente") {
            series_id = serieSelectEl ? serieSelectEl.value : "";

            if (!series_id) {
              setError("Seleccioná una serie existente.");
              return;
            }
          }
        }

        setInfo(torneoIdEdicion ? "Actualizando torneo..." : "Creando torneo...");

        let torneoId = torneoIdEdicion;

        if (torneoIdEdicion) {
          const { data: torneosActualizados, error } = await supabase
            .from("tournaments")
            .update({
              name: nombre,
              tournament_date: fecha,
              game_mode_id: modalidad,
              start_type: tipoSalida,
              hole_count: holeCount,
              series_id,
              series_round_number
            })
            .eq("id", torneoIdEdicion)
            .select("id");

          console.log("DEBUG update tournament", torneosActualizados, error);

          if (error) throw error;
          if (!torneosActualizados || torneosActualizados.length === 0) {
            throw new Error("No se pudo actualizar el torneo.");
          }

          torneoId = torneosActualizados[0].id;
        } else {
          const { data: torneosNuevos, error } = await supabase
            .from("tournaments")
            .insert({
              name: nombre,
              tournament_date: fecha,
              game_mode_id: modalidad,
              start_type: tipoSalida,
              start_type_template_id: "642952e9-c289-48a8-9df6-788d1378b0e7",
              hole_count: holeCount,
              status: "closed",
              series_id,
              series_round_number
            })
            .select("id");

          console.log("DEBUG insert tournament", torneosNuevos, error);

          if (error) throw error;
          if (!torneosNuevos || torneosNuevos.length === 0) {
            throw new Error("No se pudo crear el torneo.");
          }

          torneoId = torneosNuevos[0].id;
        }

        console.log("ANTES DE syncCategorias", torneoId);
        await syncCategorias(torneoId);
        console.log("DESPUES DE syncCategorias", torneoId);

        if (tipoSalida === "secuencial") {
          await syncSecuencial(torneoId);
        } else {
          await syncSimultanea(torneoId);
        }

        setOk(torneoIdEdicion ? "Torneo actualizado." : "Torneo creado.");

        if (torneoIdEdicion) {
          await cargarGrilla();
        }

        await cargarTorneos();

        document.getElementById("nombre").value = "";
        document.getElementById("fecha").value = "";
        document.getElementById("horaInicioB1A").value = "";
        document.getElementById("lineasB1A").value = "0";
        document.getElementById("horaInicioB1B").value = "";
        document.getElementById("lineasB1B").value = "0";

        document.getElementById("horaInicioB2A").value = "";
        document.getElementById("lineasB2A").value = "0";
        document.getElementById("horaInicioB2B").value = "";
        document.getElementById("lineasB2B").value = "0";

        document.getElementById("intervalo").value = "10";

        Array.from(categoriasEl.options).forEach(opt => {
          opt.selected = false;
        });

        inicializarBisSimultanea();
        renderBisHoles();

        tipoSalidaEl.value = "secuencial";
        actualizarVisibilidadTipoSalida();

        usaSerieEl.value = "no";
        document.getElementById("serieNombre").value = "";
        document.getElementById("serieRequiredRounds").value = "3";
        document.getElementById("serieRonda").value = "";
        if (serieSelectEl) serieSelectEl.value = "";
        await cargarSeries();
        actualizarCamposSerie();

        document.getElementById("crear").textContent = "Guardar Torneo";

        if (torneoIdEdicion) {
          window.location.href = window.location.pathname;
        }
      } catch (error) {
        console.error("Error guardando torneo:", error);
        setError(error?.message || "Ocurrió un error al guardar el torneo.");
      }
    });

    window.abrirTorneo = function (id) {
      window.location.href = `admin_torneos.html?torneo_id=${id}`;
    };
    window.verGrilla = function (id) {
      window.location.href = `grilla_interactiva.html?torneo_id=${id}`;
    };

    window.toggleInscripcion = async function (id, estadoActual) {

      const estadoNormalizado = String(estadoActual || "draft").toLowerCase();
      const nuevoEstado = estadoNormalizado === "open" ? "closed" : "open";

      const { error } = await supabase
        .from("tournaments")
        .update({ status: nuevoEstado })
        .eq("id", id);

      if (error) {
        console.error("Error actualizando estado del torneo:", error);
        estado.textContent = "No se pudo actualizar el estado del torneo.";
        estado.className = "error";
        return;
      }

      estado.textContent = `Torneo ${nuevoEstado === "open" ? "abierto" : "cerrado"} para inscripción.`;
      estado.className = "ok";

      await cargarTorneos();
    };

    window.eliminarTorneo = async function (id, nombre) {
      const ok = await mostrarConfirmacion(
        `¿Seguro que querés eliminar completamente el torneo "${nombre}"?`
      );
      if (!ok) return;

      // 1) buscar bloques del torneo
      const { data: bloques, error: errorBloques } = await supabase
        .from("starting_blocks")
        .select("id")
        .eq("tournament_id", id);

      if (errorBloques) {
        console.error("Error cargando bloques del torneo:", errorBloques);
        estado.textContent = "No se pudo validar el torneo antes de eliminarlo.";
        estado.className = "error";
        return;
      }

      const idsBloques = (bloques || []).map(b => b.id);

      // 2) buscar líneas de esos bloques
      let idsLineas = [];

      if (idsBloques.length > 0) {
        const { data: lineas, error: errorLineas } = await supabase
          .from("starting_lines")
          .select("id")
          .in("starting_block_id", idsBloques);

        if (errorLineas) {
          console.error("Error cargando líneas del torneo:", errorLineas);
          estado.textContent = "No se pudo validar el torneo antes de eliminarlo.";
          estado.className = "error";
          return;
        }

        idsLineas = (lineas || []).map(l => l.id);
      }

      // 3) buscar slots ocupados
      if (idsLineas.length > 0) {
        const { data: slots, error: errorSlots } = await supabase
          .from("line_slots")
          .select("id, display_name, linked_player_id")
          .in("starting_line_id", idsLineas);

        if (errorSlots) {
          console.error("Error cargando slots del torneo:", errorSlots);
          estado.textContent = "No se pudo validar el torneo antes de eliminarlo.";
          estado.className = "error";
          return;
        }

        const hayOcupados = (slots || []).some(s =>
          (s.display_name && s.display_name.trim() !== "") ||
          s.linked_player_id
        );

        if (hayOcupados) {
          estado.textContent = "No podés eliminar el torneo porque tiene jugadores anotados.";
          estado.className = "error";
          return;
        }
      }

      // 4) eliminar torneo
      const { error } = await supabase
        .from("tournaments")
        .delete()
        .eq("id", id);

      if (error) {
        console.error("Error eliminando torneo:", error);
        estado.textContent = "No se pudo eliminar el torneo.";
        estado.className = "error";
        return;
      }

      estado.textContent = "Torneo eliminado.";
      estado.className = "ok";

      await cargarTorneos();
      grillaEl.innerHTML = "";
    };

    (async () => {
      inicializarBisSimultanea();
      renderBisHoles();
      await cargarModalidades();
      await cargarSeries();
      await cargarTorneos();
      await cargarTorneoEnEdicion();
      await cargarGrilla();
      actualizarVisibilidadTipoSalida();
      actualizarCamposSerie();
    })();

    tipoSalidaEl.addEventListener("change", actualizarVisibilidadTipoSalida);

    document.getElementById("btnHome").addEventListener("click", () => {
      window.location.href = "panel.html";
    });

  </script>
