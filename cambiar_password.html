<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cambiar contraseña - VMGC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div style="max-width:340px;margin:80px auto;font-family:Arial;">
        <h2 style="color:#166534;">Nueva contraseña</h2>

        <input id="password" type="password" placeholder="Nueva contraseña"
            style="width:100%;padding:10px;margin-bottom:12px;box-sizing:border-box;">

        <button id="btnCambiar"
            style="width:100%;padding:10px;background:#166534;color:white;border:none;border-radius:8px;font-weight:bold;">
            Guardar nueva contraseña
        </button>

        <div id="msg" style="margin-top:12px;font-size:13px;"></div>
    </div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

        const supabase = createClient(
            "https://bnnfolhrqxgxjmobclrm.supabase.co",
            "sb_publishable_pNxU4AFpAZPpeJ0wICLvIw_6nW90njQ"
        );

        const msg = document.getElementById("msg");

        document.getElementById("btnCambiar").addEventListener("click", async () => {
            const password = document.getElementById("password").value;

            if (!password || password.length < 6) {
                msg.style.color = "#b91c1c";
                msg.textContent = "La contraseña debe tener al menos 6 caracteres.";
                return;
            }

            const { error } = await supabase.auth.updateUser({
                password
            });

            if (error) {
                msg.style.color = "#b91c1c";
                msg.textContent = error.message;
                return;
            }

            msg.style.color = "#166534";
            msg.textContent = "Contraseña actualizada correctamente.";

            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        });
    </script>
</body>

</html>
