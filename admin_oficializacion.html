<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oficialización - Villa María Golf</title>
  <style>
    :root {
      --bg: #f3f6f1;
      --card: #ffffff;
      --line: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --green: #166534;
      --green-2: #166534;
      --blue: #0841bb;
      --gold: #e7b067;
      --red: #b91c1c;
      --soft-green: #dcfce7;
      --soft-gray: #f3f4f6;
      --soft-amber: #fef3c7;
      --soft-red: #fff1f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 100%;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .title-wrap h1 {
      margin: 0 0 4px;
      font-size: 30px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, .08);
      margin-bottom: 16px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(320px, 1.4fr) minmax(150px, .55fr) minmax(150px, .55fr) minmax(200px, .9fr);
      gap: 12px;
      align-items: end;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    select,
    input {
      width: 100%;
      height: 34px;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      padding: 6px 8px;
      font-size: 12px;
      background: #fff;
    }

    input[readonly],
    select[disabled] {
      background: #fafafa;
      color: #374151;
      cursor: default;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fafafa;
    }

    .stat .k {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 6px;
    }

    .stat .v {
      font-size: 24px;
      font-weight: 700;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-text.ok {
      color: var(--green);
      font-weight: 700;
    }

    .status-text.error {
      color: var(--red);
      font-weight: 700;
    }

    .status-text.warn {
      color: #e7b067;
      font-weight: 700;
    }

    .actions-top {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      height: 40px;
      padding: 0 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--green);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--green-2);
    }

    .btn-secondary {
      background: var(--blue);
      color: #fff;
    }

    .btn-secondary:hover:not(:disabled) {
      filter: brightness(.95);
    }

    .btn-light {
      background: var(--gold);
      color: #fff;
    }

    .table-card {
      padding: 0;
      overflow: hidden;
    }

    .table-scroll {
      overflow-x: auto;
      width: 100%;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1120px;
      table-layout: fixed;
      background: #fff;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      vertical-align: middle;
      font-size: 12px;
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--green);
      color: white;
      white-space: nowrap;
      text-align: center;
    }

    th.col-center,
    td.col-center {
      text-align: center !important;
    }

    th.col-left,
    td.col-left {
      text-align: left !important;
    }

    td.col-center select,
    td.col-center input {
      text-align: center;
    }

    tbody tr:nth-child(even) {
      background: #fbfbfb;
    }

    tbody tr:hover {
      background: #f9fafb;
    }

    .fila-revisar {
      background: #fff7ed !important;
    }

    .fila-pareja td {
      background: #fcfcfc;
    }

    .fila-invitado td {
      background: #fff7ed !important;
    }

    .player-name {
      font-weight: 700;
      font-size: 13px;
      line-height: 1.25;
    }

    .player-extra {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.25;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stack-compact {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }

    .stack input,
    .stack select {
      min-width: 0;
    }

    .pair-divider {
      height: 1px;
      background: #e5e7eb;
      width: 100%;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .tag.pending {
      background: var(--soft-gray);
      color: #374151;
    }

    .tag.done {
      background: var(--soft-green);
      color: var(--green);
    }

    .tag.review {
      background: var(--soft-amber);
      color: #e7b067;
    }

    .tag.error {
      background: var(--soft-red);
      color: var(--red);
    }

    .row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
    }

    .row-actions .btn {
      padding: 5px 8px;
      font-size: 11px;
      white-space: nowrap;
      min-width: 72px;
    }

    .muted {
      color: var(--muted);
    }

    .empty {
      padding: 18px;
      color: var(--muted);
    }

    td,
    th {
      overflow-wrap: anywhere;
    }

    .col-left {
      word-break: normal;
    }

    .row-actions .btn {
      height: 30px;
    }


    @media (max-width: 1100px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }
    }

    @media (max-width: 700px) {
      .page {
        padding: 14px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .title-wrap h1 {
        font-size: 24px;
      }
    }

    .ticket-80 {
      width: 72mm;
      margin: 0 auto;
      padding: 4mm;
      font-family: Arial, sans-serif;
      color: #000;
      box-sizing: border-box;
      page-break-after: always;
    }

    @media print {
      @page {
        size: 150mm 297mm;
        margin: 0;
      }

      html,
      body {
        margin: 0 !important;
        padding: 0 !important;
        width: 150mm !important;
        height: 297mm !important;
        overflow: hidden !important;
        background: white !important;
      }

      .page,
      .home-btn {
        display: none !important;
      }

      #print-root {
        display: block !important;
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 210mm !important;
        height: 297mm !important;
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        overflow: hidden !important;
      }

      #print-root * {
        visibility: visible !important;
      }

      .print-page {
        page-break-after: inherit !important;
        break-after: inherit !important;
      }
    }

    .home-btn {
      position: fixed;
      top: 30px;
      right: 27px;
      width: 38px;
      height: 38px;
      border-radius: 6px;
      background: #166534;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
      z-index: 9999;
      transition: transform 0.15s, background 0.15s;
    }

    .home-btn:hover {
      background: #166534;
      transform: scale(1.05);
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/qz-tray@2.2.4/qz-tray.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsrsasign@10.8.6/lib/jsrsasign-all-min.js"></script>
  <script src="./qz-ticket.js?v=999"></script>

</head>

<body>

  <div class="home-btn" id="btnHome" title="Volver al panel">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M3 10L12 3L21 10V20C21 20.55 20.55 21 20 21H4C3.45 21 3 20.55 3 20V10Z" stroke="white"
        stroke-width="2" />
    </svg>
  </div>

  <div class="page">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Admin. Torneos</h1>
        <div class="sub">Categoría, tee, índice ajustado, hándicap de juego e impresión.</div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="field">
          <label for="torneoSelect">Seleccionar torneo abierto / guardado</label>
          <select id="torneoSelect"></select>
        </div>
        <div class="field">
          <label>Fecha</label>
          <input id="torneoFecha" value="" readonly />
        </div>
        <div class="field">
          <label>Acción general</label>
          <div style="display:flex; gap:8px;">
            <button id="btnOficializarTorneo" class="btn btn-primary" style="flex:1">
              Generar Tarjetas
            </button>

            <button id="btnResumenPagos" class="btn btn-secondary" style="flex:1">
              Ver pagos
            </button>
          </div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="k">Total de jugadores inscriptos</div>
          <div class="v" id="statTotal">0</div>
        </div>
        <div class="stat">
          <div class="k">Damas</div>
          <div class="v" id="statDamas">0</div>
        </div>
        <div class="stat">
          <div class="k">Caballeros</div>
          <div class="v" id="statCaballeros">0</div>
        </div>
        <div class="stat">
          <div class="k">Socios</div>
          <div class="v" id="statSocios">0</div>
        </div>
        <div class="stat">
          <div class="k">Invitados</div>
          <div class="v" id="statInvitados">0</div>
        </div>
      </div>
    </div>

    <div class="card status-bar">
      <div id="estado" class="status-text">Conectando...</div>
      <div class="actions-top">
        <button id="btnGuardarTodos" class="btn btn-primary">Guardar todos</button>
        <button id="btnImprimirTodasTarjetas" class="btn btn-secondary">
          Imprimir todos
        </button>
      </div>
    </div>

    <div class="card" style="margin-bottom:10px;">

      <div style="
          display:grid;
          grid-template-columns: 1fr 160px 150px 160px 160px;
          gap:12px;
          align-items:center;
        ">

        <input id="buscadorJugadores" type="text" placeholder="Buscar jugador, matrícula o club..." style="
        width:100%;
        height:40px;
        font-size:14px;
        padding:0 14px;
      " />

        <select id="pagoGeneral" style="height:40px; font-size:14px;">
          <option value="pending">Pendiente</option>
          <option value="cash">Efectivo</option>
          <option value="credit_card">Tarjeta crédito</option>
          <option value="debit_card">Tarjeta débito</option>
          <option value="transfer">Transferencia</option>
          <option value="current_account">Cuenta corriente</option>
          <option value="no_pay">No paga</option>
        </select>

        <input id="fechaPagoGeneral" type="date" style="
          height:40px;
          text-align:center;
          font-weight:700;
          font-size:14px;
        " />

        <input id="torneoPrecio" type="text" value="" placeholder="Precio socio" style="
          height:40px;
          text-align:center;
          font-weight:700;
          font-size:14px;
        " />

        <input id="torneoPrecioInvitado" type="text" value="" placeholder="Precio invitado" style="
          height:40px;
          text-align:center;
          font-weight:700;
          font-size:14px;
        " />

      </div>

    </div>

    <div class="card table-card">
      <div class="table-scroll" id="tablaWrap"></div>
    </div>
  </div>

  <div id="print-root"></div>

  <script type="module">

    const CLUB_NOMBRE = "Villa María Golf Club";

    const PAYMENT_METHODS = {
      pending: "Pendiente",
      cash: "Efectivo",
      credit_card: "Tarjeta crédito",
      debit_card: "Tarjeta débito",
      transfer: "Transferencia",
      current_account: "Cuenta corriente",
      no_pay: "No paga"
    };

    function paymentOptions(selected = "pending") {
      return Object.entries(PAYMENT_METHODS)
        .map(([value, label]) => `<option value="${value}" ${value === selected ? "selected" : ""}>${label}</option>`)
        .join("");
    }

    function hoyInputLocal() {
      const d = new Date();
      const anio = d.getFullYear();
      const mes = String(d.getMonth() + 1).padStart(2, "0");
      const dia = String(d.getDate()).padStart(2, "0");
      return `${anio}-${mes}-${dia}`;
    }

    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabase = createClient(
      "https://bnnfolhrqxgxjmobclrm.supabase.co",
      "sb_publishable_pNxU4AFpAZPpeJ0wICLvIw_6nW90njQ"
    );

    async function exigirAdmin() {
      const { data: { session } } = await supabase.auth.getSession();

      if (!session) {
        window.location.href = "login.html";
        throw new Error("Sin sesión");
      }

      const { data: profile, error } = await supabase
        .from("profiles")
        .select("role, active")
        .eq("id", session.user.id)
        .maybeSingle();

      if (error || !profile || profile.active !== true || profile.role !== "admin") {
        alert("No tenés permiso para entrar a esta página.");
        window.location.href = "panel.html";
        throw new Error("Sin permiso admin");
      }

      return session.user;
    }

    let adminActual = null;

    adminActual = await exigirAdmin();

    qz.security.setCertificatePromise(function (resolve, reject) {
      fetch("https://cdn.jsdelivr.net/npm/qz-tray@2.2.4/auth/signing/digital-certificate.txt")
        .then(function (data) {
          data.ok ? resolve(data.text()) : reject(data.text());
        });
    });

    qz.security.setSignatureAlgorithm("SHA512");

    qz.security.setSignaturePromise(function (toSign) {
      return function (resolve, reject) {

        fetch("https://cdn.jsdelivr.net/npm/qz-tray@2.2.4/auth/signing/sign-message.php?request=" + encodeURIComponent(toSign), {
          cache: "no-store",
          headers: {
            "Content-Type": "text/plain"
          }
        })
          .then(function (data) {
            data.ok ? resolve(data.text()) : reject(data.text());
          });

      };
    });

    qz.security.setCertificatePromise(function (resolve, reject) {
      resolve(`-----BEGIN CERTIFICATE-----
        ACA VA EL CERTIFICADO
        -----END CERTIFICATE-----`);
    });

    qz.security.setSignaturePromise(function (toSign) {
      return function (resolve, reject) {

        // DEMO
        resolve();
      };
    });

    console.log("OFICIALIZACION VERSION INDEX AAG VIVO 2026-05-14");

    const $ = (id) => document.getElementById(id);

    const estado = $("estado");
    const tablaWrap = $("tablaWrap");
    const printRoot = $("print-root");
    const torneoSelect = $("torneoSelect");
    const torneoFecha = $("torneoFecha");
    const torneoPrecio = $("torneoPrecio");
    const torneoPrecioInvitado = $("torneoPrecioInvitado");

    const pagoGeneral = $("pagoGeneral");
    const fechaPagoGeneral = $("fechaPagoGeneral");

    fechaPagoGeneral.value = hoyInputLocal();

    const ARS_FORMATTER = new Intl.NumberFormat("es-AR", {
      style: "currency",
      currency: "ARS",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    const statTotal = document.getElementById("statTotal");
    const statDamas = document.getElementById("statDamas");
    const statCaballeros = document.getElementById("statCaballeros");
    const statSocios = document.getElementById("statSocios");
    const statInvitados = document.getElementById("statInvitados");

    const btnOficializarTorneo = document.getElementById("btnOficializarTorneo");
    const btnResumenPagos = document.getElementById("btnResumenPagos");
    const btnGuardarTodos = document.getElementById("btnGuardarTodos");
    const btnImprimirTodasTarjetas = document.getElementById("btnImprimirTodasTarjetas");

    configurarSucursalPorAdmin(adminActual);

    let realtimeChannel = null;
    let realtimeReloadTimer = null;
    let autoRefreshTimer = null;
    let realtimeTournamentId = null;

    let torneoActual = null;
    let registrations = [];
    let categorias = [];
    let tees = [];

    let regMap = new Map();
    let categoriaMap = new Map();
    let teeMap = new Map();
    let startingLinesMap = new Map();

    let aagEnrolledsMap = new Map();
    let pagosMap = new Map();

    let filasVistaCache = null;
    let autoCategoriaDesdeIndexManual = false;

    let usuarioEditandoTabla = false;

    torneoSelect.addEventListener("change", cargarTodo);
    btnOficializarTorneo.addEventListener("click", oficializarTorneo);
    btnResumenPagos.addEventListener("click", imprimirResumenPagos);
    btnGuardarTodos.addEventListener("click", guardarTodosLosInscriptos);
    btnImprimirTodasTarjetas.addEventListener("click", imprimirTodasLasTarjetas);

    tablaWrap.addEventListener("click", manejarClickTabla);
    tablaWrap.addEventListener("change", manejarCambioTabla);

    tablaWrap.addEventListener("focusin", (e) => {
      if (e.target.matches("input, select")) {
        usuarioEditandoTabla = true;
      }
    });

    tablaWrap.addEventListener("focusout", (e) => {
      if (e.target.matches("input, select")) {
        setTimeout(() => {
          usuarioEditandoTabla = false;
        }, 1500);
      }
    });

    document
      .getElementById("buscadorJugadores")
      ?.addEventListener("input", filtrarTablaJugadores);

    torneoPrecio.addEventListener("focus", () => {

      const numero = obtenerPrecioTorneo();

      torneoPrecio.value =
        numero > 0
          ? String(Math.round(numero))
          : "";

    });


    torneoPrecio.addEventListener("blur", () => {
      const numero = obtenerPrecioTorneo();

      if (!numero) {
        torneoPrecio.value = "";
        guardarPrecioTorneoLocal();
        return;
      }

      torneoPrecio.value = numero.toLocaleString("es-AR", {
        style: "currency",
        currency: "ARS",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });

      guardarPrecioTorneoLocal();
    });

    torneoPrecioInvitado.addEventListener("focus", () => {

      const numero = obtenerPrecioInvitado();

      torneoPrecioInvitado.value =
        numero > 0
          ? String(Math.round(numero))
          : "";

    });

    torneoPrecioInvitado.addEventListener("blur", () => {

      const numero = obtenerPrecioInvitado();

      if (!numero) {
        torneoPrecioInvitado.value = "";
        guardarPrecioTorneoLocal();
        return;
      }

      torneoPrecioInvitado.value = numero.toLocaleString("es-AR", {
        style: "currency",
        currency: "ARS",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });

      guardarPrecioTorneoLocal();

    });

    function setEstado(texto, tipo = "") {
      estado.textContent = texto;
      estado.className = `status-text ${tipo}`.trim();
    }

    function horaTexto(valor) {
      if (!valor) return "";
      return String(valor).slice(0, 5);
    }

    function fechaTexto(valor) {
      if (!valor) return "";

      const d = new Date(valor + "T00:00:00");

      const dia = String(d.getDate()).padStart(2, "0");
      const mes = String(d.getMonth() + 1).padStart(2, "0");
      const anio = d.getFullYear();

      return `${dia}/${mes}/${anio}`;
    }

    function setSucursal(codigo) {
      localStorage.setItem("ticket_branch_code", codigo);
      mostrarSucursal();
      alert("Sucursal configurada: " + codigo);
    }

    function mostrarSucursal() {
      const s = localStorage.getItem("ticket_branch_code") || "S1";
      console.log("Sucursal actual:", s);
    }

    function configurarSucursalPorAdmin(user) {
      const email = String(user?.email || "").toLowerCase();

      const sucursalPorAdmin = {
        "lau_m2000@hotmail.com": "S1", // Laura
        "giselaantonino@gmail.com": "S2"  // Gisela
      };

      const sucursal = sucursalPorAdmin[email] || "S1";

      localStorage.setItem("ticket_branch_code", sucursal);
      mostrarSucursal();

      console.log("Sucursal asignada por admin:", email, sucursal);
    }

    function money(v) {
      return ARS_FORMATTER.format(Number(v || 0));
    }

    function formatearPesosInput(valor) {
      if (!valor) return "";

      const limpio = valor.replace(/[^\d]/g, ""); // solo números

      if (!limpio) return "";

      const numero = Number(limpio) / 100;

      return numero.toLocaleString("es-AR", {
        style: "currency",
        currency: "ARS",
        minimumFractionDigits: 2
      });
    }

    function precioStorageKey() {
      return `precio_torneo_${torneoActual?.id || "sin_torneo"}`;
    }

    function guardarPrecioTorneoLocal() {

      if (!torneoActual?.id) return;

      const precioSocio = obtenerPrecioTorneo();
      const precioInvitado = obtenerPrecioInvitado();

      localStorage.setItem(
        `precio_torneo_${torneoActual.id}`,
        String(precioSocio)
      );

      localStorage.setItem(
        `precio_torneo_invitado_${torneoActual.id}`,
        String(precioInvitado)
      );
    }

    function cargarPrecioTorneoLocal() {

      if (!torneoActual?.id) return;

      const precioSocio = localStorage.getItem(
        `precio_torneo_${torneoActual.id}`
      );

      const precioInvitado = localStorage.getItem(
        `precio_torneo_invitado_${torneoActual.id}`
      );

      torneoPrecio.value = precioSocio
        ? Number(precioSocio).toLocaleString("es-AR", {
          style: "currency",
          currency: "ARS",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        })
        : "";

      torneoPrecioInvitado.value = precioInvitado
        ? Number(precioInvitado).toLocaleString("es-AR", {
          style: "currency",
          currency: "ARS",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        })
        : "";
    }

    function programarRecargaOficializacion() {
      if (usuarioEditandoTabla) return;

      clearTimeout(realtimeReloadTimer);

      realtimeReloadTimer = setTimeout(() => {
        if (usuarioEditandoTabla) return;
        cargarTodo();
      }, 500);
    }

    function suscribirRealtimeOficializacion() {
      if (!torneoActual?.id) return;

      if (realtimeChannel) {
        supabase.removeChannel(realtimeChannel);
        realtimeChannel = null;
      }

      realtimeChannel = supabase
        .channel(`oficializacion-${torneoActual.id}`)
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "registrations",
            filter: `tournament_id=eq.${torneoActual.id}`
          },
          () => programarRecargaOficializacion()
        )
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "line_slots"
          },
          () => programarRecargaOficializacion()
        )
        .on(
          "postgres_changes",
          {
            event: "*",
            schema: "public",
            table: "scorecards"
          },
          () => programarRecargaOficializacion()
        )

        .subscribe((status) => {
          console.log("Realtime oficialización:", status);
        });
    }

    function obtenerPrecioTorneo() {
      const valor = String(torneoPrecio.value || "")
        .replace(/\$/g, "")
        .replace(/\s/g, "")
        .replace(/\./g, "")
        .replace(",", ".");

      const numero = Number(valor);

      return Number.isNaN(numero) ? 0 : numero;
    }

    function obtenerPrecioInvitado() {
      const valor = String(torneoPrecioInvitado.value || "")
        .replace(/\$/g, "")
        .replace(/\s/g, "")
        .replace(/\./g, "")
        .replace(",", ".");

      const numero = Number(valor);

      return Number.isNaN(numero) ? 0 : numero;
    }

    function obtenerImporteSegunPago(reg = null) {
      const metodo = pagoGeneral?.value || "pending";

      if (metodo === "pending" || metodo === "no_pay") {
        return 0;
      }

      if (reg && esInvitado(reg)) {
        return obtenerPrecioInvitado();
      }

      return obtenerPrecioTorneo();
    }

    function obtenerImportePorMetodoYJugador(metodo, reg) {
      if (metodo === "pending" || metodo === "no_pay") {
        return 0;
      }

      if (esInvitado(reg)) {
        return obtenerPrecioInvitado();
      }

      return obtenerPrecioTorneo();
    }

    function normalizarGenero(gender) {
      const g = String(gender || "").toLowerCase().trim();
      if (["male", "caballero", "caballeros", "hombre", "masculino", "m"].includes(g)) return "male";
      if (["female", "dama", "damas", "mujer", "femenino", "f"].includes(g)) return "female";
      return g;
    }

    function normalizarSegmento(segment) {
      const s = String(segment || "").toLowerCase().trim();
      if (["18", "18h", "18 hoyos", "18 holes", "full", "completo"].includes(s)) return "18";
      if (["9", "9h", "9 hoyos"].includes(s)) return "9";
      if (["front9", "front 9", "primeros 9"].includes(s)) return "front9";
      if (["back9", "back 9", "segundos 9"].includes(s)) return "back9";
      return s;
    }

    function roundHalfUp(value) {
      const n = Number(value);
      if (Number.isNaN(n)) return null;
      return Math.floor(n + 0.5);
    }

    function toNumber(value) {
      if (value == null || value === "") return null;
      const n = Number(value);
      return Number.isNaN(n) ? null : n;
    }

    function formatDecimal(value, digits = 2) {
      const n = toNumber(value);
      if (n == null) return "";
      return n.toFixed(digits);
    }

    function redondearIndiceUnDecimal(value) {
      const n = toNumber(value);
      if (n == null) return null;
      return Math.round((n + Number.EPSILON) * 10) / 10;
    }

    function formatIndexAAG(value) {
      return formatDecimal(value, 1);
    }

    function formatIndexManual(value) {
      const n = redondearIndiceUnDecimal(value);
      return n == null ? "" : n.toFixed(1);
    }

    function extraerScorecard(reg) {
      return Array.isArray(reg.scorecards) ? reg.scorecards[0] : reg.scorecards;
    }

    function extraerLinea(reg) {
      if (
        reg?.starting_line_id &&
        startingLinesMap.has(String(reg.starting_line_id))
      ) {
        return startingLinesMap.get(String(reg.starting_line_id));
      }

      return Array.isArray(reg.starting_lines)
        ? reg.starting_lines[0]
        : reg.starting_lines;
    }

    function extraerLineSlot(reg) {
      return Array.isArray(reg.line_slots) ? reg.line_slots[0] : reg.line_slots;
    }

    function normalizarMatriculaAAG(valor) {
      const txt = String(valor ?? "").trim();
      if (!txt) return null;
      return txt.replace(/\.0$/, "");
    }

    function obtenerMatriculaAAG(reg) {
      return normalizarMatriculaAAG(
        reg?.aag_member_number ||
        reg?.player?.aag_member_number ||
        extraerLineSlot(reg)?.aag_member_number ||
        null
      );
    }

    function obtenerJugadorAAGVivo(reg) {
      const mat = obtenerMatriculaAAG(reg);
      if (!mat) return null;
      return aagEnrolledsMap.get(String(mat)) || null;
    }

    function obtenerIndiceAAG(reg) {
      const jugadorAAG = obtenerJugadorAAGVivo(reg);
      const desdeAAG = jugadorAAG?.current_index;

      console.log("INDEX OFICIALIZACION", {
        jugador: reg.display_name,
        matricula: obtenerMatriculaAAG(reg),
        aag: jugadorAAG,
        indexAAG: desdeAAG,
        indexPlayer: reg.player?.current_index,
        indexReg: reg.reported_index,
        indexSlot: extraerLineSlot(reg)?.manual_index
      });

      // Si encuentra AAG, NO usar nada viejo.
      if (desdeAAG != null) return toNumber(desdeAAG);

      const desdePlayer = reg.player?.current_index;
      const desdeReg = reg.reported_index;
      const desdeSlot = extraerLineSlot(reg)?.manual_index;

      const valor = desdePlayer ?? desdeReg ?? desdeSlot;
      return toNumber(valor);
    }

    function jugadorSinIndexAAG(reg) {
      return obtenerIndiceAAG(reg) == null;
    }

    function obtenerIndexManualEditable(regId) {
      const el = document.getElementById(`idx-${regId}`);
      if (!el) return null;

      const valor = String(el.value || "")
        .trim()
        .replace(",", ".");

      return toNumber(valor);
    }

    function esTorneoDeParejas() {
      return torneoActual?.game_modes?.participation_type === "pair";
    }

    function paramsCalculo() {
      return torneoActual?.game_modes?.calculation_params || {};
    }

    function esMetodoClasico() {
      return paramsCalculo()?.method === "pair_sum_with_max_gap";
    }

    function esMetodoAmericana() {
      return paramsCalculo()?.method === "individual_percentage";
    }

    function optionTags(items, selectedId, labelField = "name") {
      return items.map((item) => {
        const isSelected = String(item.id) === String(selectedId);
        return `<option value="${item.id}" ${isSelected ? "selected" : ""}>${item[labelField]}</option>`;
      }).join("");
    }

    function rebuildIndexes() {
      regMap = new Map(registrations.map((r) => [String(r.id), r]));
      categoriaMap = new Map(categorias.map((c) => [String(c.id), c]));
      teeMap = new Map(tees.map((t) => [String(t.id), t]));
      filasVistaCache = null;
    }

    function getRegistrationById(id) {
      return regMap.get(String(id)) || null;
    }

    function getCategoriaById(id) {
      if (!id) return null;
      return categoriaMap.get(String(id)) || null;
    }

    function getTeeName(teeId) {
      if (!teeId) return "—";
      return teeMap.get(String(teeId))?.name || "—";
    }

    function categoriaTeeName(categoriaId) {
      const categoria = getCategoriaById(categoriaId);
      if (!categoria?.tee_id) return "—";
      return getTeeName(categoria.tee_id);
    }

    function categoriaSegmento(categoria) {
      return normalizarSegmento(categoria?.hole_segment || "18");
    }

    function ajustarIndicePorSegmento(indiceAAG, holeSegment) {
      const idx = toNumber(indiceAAG);
      if (idx == null) return null;
      const seg = normalizarSegmento(holeSegment);
      if (seg === "front9" || seg === "back9" || seg === "9") return idx / 2;
      return idx;
    }

    function ajustarPorBrechaMaxima(idx1, idx2, maxGap = 5) {
      const a = toNumber(idx1);
      const b = toNumber(idx2);
      if (a == null || b == null) return [null, null];

      const menor = Math.min(a, b);
      const mayor = Math.max(a, b);
      const mayorAjustado = Math.min(mayor, menor + maxGap);

      return a <= b ? [menor, mayorAjustado] : [mayorAjustado, menor];
    }

    function calcularIndiceManualMedal(indiceAAG, categoria) {
      return ajustarIndicePorSegmento(indiceAAG, categoria?.hole_segment);
    }

    function obtenerSegmentoReferencia(genderValor = null) {
      const genderNormalizado = genderValor ? normalizarGenero(genderValor) : null;
      const categoria = categorias.find((c) =>
        c?.hole_segment && (!genderNormalizado || normalizarGenero(c.gender) === genderNormalizado)
      ) || categorias.find((c) => c?.hole_segment);
      return categoria?.hole_segment || "18";
    }

    function calcularIndiceManualAmericana(indiceAAG, categoria) {
      const base = ajustarIndicePorSegmento(indiceAAG, categoria?.hole_segment);
      if (base == null) return null;
      return base * 0.85;
    }

    function calcularIndiceManualAmericanaParaCategoria(indiceAAG, genderValor) {
      const base = ajustarIndicePorSegmento(indiceAAG, obtenerSegmentoReferencia(genderValor));
      if (base == null) return null;
      return base * 0.85;
    }

    function calcularIndiceCategoriaAmericana(indiceAAG, genderValor) {
      // Para DEFINIR CATEGORIA en Americana se aplica el 85% y se redondea el INDEX a 1 decimal.
      // Ejemplo: 10,7 x 0,85 = 9,095 => 9,1. Ese 9,1 busca la categoria.
      // El HCP se calcula con el valor completo 9,095 y recién el HCP se redondea 0,5 hacia arriba.
      const indexAmericana = calcularIndiceManualAmericanaParaCategoria(indiceAAG, genderValor);
      return redondearIndiceUnDecimal(indexAmericana);
    }

    function sugerirCategoriaAmericanaDesdeAAG(indiceAAG, genderValor) {
      const indexParaCategoria = calcularIndiceCategoriaAmericana(indiceAAG, genderValor);
      return sugerirCategoria(indexParaCategoria, genderValor);
    }

    function calcularIndiceManualClasico(indiceAAG1, indiceAAG2, categoria) {
      const maxGap = Number(paramsCalculo().max_gap ?? 5);
      const [aj1, aj2] = ajustarPorBrechaMaxima(indiceAAG1, indiceAAG2, maxGap);
      if (aj1 == null || aj2 == null) return null;

      const seg = normalizarSegmento(categoria?.hole_segment || "18");
      const suma = aj1 + aj2;
      const sumaSegmentada = (seg === "front9" || seg === "back9" || seg === "9") ? (suma / 2) : suma;
      return sumaSegmentada * 0.375;
    }

    function calcularHcpDesdeCategoria(indiceManual, categoria) {
      const idx = toNumber(indiceManual);
      if (idx == null || !categoria) return null;

      const slope = toNumber(categoria.slope);
      const courseRating = toNumber(categoria.course_rating);
      const par = toNumber(categoria.par);
      if ([slope, courseRating, par].some((v) => v == null)) return null;

      const valor = (idx * (slope / 113)) + (courseRating - par);
      const hcp = roundHalfUp(valor);

      if (hcp == null) return null;

      return Math.min(hcp, 54);
    }

    function sugerirCategoria(indexManual, genderValor) {
      const idx = toNumber(indexManual);
      if (idx == null) return null;
      const genderNormalizado = normalizarGenero(genderValor);

      const porGenero = categorias.find((c) => {
        const min = toNumber(c.index_min);
        const max = toNumber(c.index_max);
        const categoriaGender = normalizarGenero(c.gender);
        return min != null && max != null && idx >= min && idx <= max && categoriaGender === genderNormalizado;
      });

      if (porGenero) return porGenero;

      // Fallback: si el jugador no trae gender o la categoría no lo tiene normalizado,
      // igual intenta ubicar por rango de index.
      return categorias.find((c) => {
        const min = toNumber(c.index_min);
        const max = toNumber(c.index_max);
        return min != null && max != null && idx >= min && idx <= max;
      }) || null;
    }

    function sugerirCategoriaSinGenero(indexManual) {
      const idx = toNumber(indexManual);
      if (idx == null) return null;

      return categorias.find((c) => {
        const min = toNumber(c.index_min);
        const max = toNumber(c.index_max);
        return min != null && max != null && idx >= min && idx <= max;
      }) || null;
    }

    function minutosLinea(reg) {
      const line = extraerLinea(reg);
      const hora = String(line?.line_time || "").slice(0, 5);
      const [hh, mm] = hora.split(":").map(Number);

      if (Number.isNaN(hh) || Number.isNaN(mm)) return 99999;

      return hh * 60 + mm;
    }

    function hoyoLinea(reg) {
      const line = extraerLinea(reg);
      const hoyo = Number(line?.starting_hole || 999);

      return Number.isNaN(hoyo) ? 999 : hoyo;
    }

    function ordenarFilasPorSalida(a, b) {
      const regA = a.jugadores[0];
      const regB = b.jugadores[0];

      const horaA = minutosLinea(regA);
      const horaB = minutosLinea(regB);

      if (horaA !== horaB) return horaA - horaB;

      const hoyoA = hoyoLinea(regA);
      const hoyoB = hoyoLinea(regB);

      if (hoyoA !== hoyoB) return hoyoA - hoyoB;

      const nombreA = regA?.display_name || "";
      const nombreB = regB?.display_name || "";

      return nombreA.localeCompare(nombreB, "es", {
        sensitivity: "base"
      });
    }

    function construirFilasVista() {
      if (filasVistaCache) return filasVistaCache;

      if (!esTorneoDeParejas()) {
        filasVistaCache = registrations
          .map((reg) => ({ tipo: "single", jugadores: [reg] }))
          .sort(ordenarFilasPorSalida)

        return filasVistaCache;
      }

      const usadas = new Set();
      const filas = [];

      for (const reg of registrations) {
        if (usadas.has(reg.id)) continue;

        let companero = null;

        if (reg.partner_registration_id) {
          companero = getRegistrationById(reg.partner_registration_id);
        }

        if (!companero) {
          companero = registrations.find((r) => !usadas.has(r.id) && String(r.partner_registration_id) === String(reg.id)) || null;
        }

        if (companero) {
          usadas.add(reg.id);
          usadas.add(companero.id);
          filas.push({ tipo: "pair", jugadores: [reg, companero] });
        } else {
          usadas.add(reg.id);
          filas.push({ tipo: "single", jugadores: [reg] });
        }
      }

      filasVistaCache = filas;
      return filas.sort(ordenarFilasPorSalida);
    }

    function esSocioVMGC(reg) {
      const clubName = String(
        reg.club_name ||
        reg.player?.club_name ||
        obtenerJugadorAAGVivo(reg)?.club_name ||
        ""
      ).toLowerCase();

      const optionClubId = String(
        reg.option_club_id ||
        reg.player?.option_club_id ||
        obtenerJugadorAAGVivo(reg)?.option_club_id ||
        ""
      ).trim();

      return optionClubId === "408" || clubName.includes("villa maría golf") || clubName.includes("villa maria golf");
    }

    function actualizarResumen() {
      const total = registrations.length;
      let damas = 0;
      let caballeros = 0;
      let socios = 0;
      let invitados = 0;

      for (const reg of registrations) {
        const genero = normalizarGenero(reg.player?.gender || "");

        if (genero === "female") damas++;
        if (genero === "male") caballeros++;

        if (esSocioVMGC(reg)) socios++;
        else invitados++;
      }

      statTotal.textContent = total;
      statDamas.textContent = damas;
      statCaballeros.textContent = caballeros;
      statSocios.textContent = socios;
      statInvitados.textContent = invitados;
    }

    function esInvitado(reg) {
      return !esSocioVMGC(reg);
    }

    async function cargarTodo(esAutoRefresh = false) {
      const activo = document.activeElement;

      if (
        esAutoRefresh &&
        activo &&
        tablaWrap.contains(activo) &&
        activo.matches("input, select")
      ) {
        return;
      }

      try {
        if (!esAutoRefresh) {
          setEstado("Cargando torneo...");
        }

        const { data: torneosData, error: errorTorneos } = await supabase
          .from("tournaments")
          .select("id, name, tournament_date, status")
          .eq("status", "open")
          .order("tournament_date", { ascending: true });

        if (errorTorneos) throw errorTorneos;

        if (!torneosData || torneosData.length === 0) {
          torneoSelect.innerHTML = "";
          torneoFecha.value = "";
          tablaWrap.innerHTML = `<div class="empty">No hay torneos abiertos ni guardados.</div>`;
          setEstado("No se encontraron torneos abiertos ni guardados.", "warn");
          return;
        }

        const torneoIdPrevio = torneoSelect.value;
        torneoSelect.innerHTML = torneosData.map((t) => {
          const selected = torneoIdPrevio ? String(t.id) === String(torneoIdPrevio) : false;
          return `<option value="${t.id}" ${selected ? "selected" : ""}>${t.name} (${fechaTexto(t.tournament_date)})</option>`;
        }).join("");

        const torneoIdSeleccionado = torneoSelect.value || torneosData[0]?.id;
        if (!torneoIdSeleccionado) {
          torneoFecha.value = "";
          tablaWrap.innerHTML = `<div class="empty">No hay torneos disponibles.</div>`;
          setEstado("Sin datos", "warn");
          return;
        }

        const { data: torneo, error: errorTorneo } = await supabase
          .from("tournaments")
          .select(`
        id,
        name,
        tournament_date,
        status,
        game_mode_id,
        game_modes (
          id,
          name,
          participation_type,
          calculation_params
        )
      `)
          .eq("id", torneoIdSeleccionado)
          .single();

        if (errorTorneo) throw errorTorneo;

        torneoActual = torneo;
        cargarPrecioTorneoLocal();

        const torneoYaGuardado = String(torneoActual.status || "").toLowerCase() === "officialized";

        if (torneoYaGuardado) {
          setEstado("Torneo ya guardado · podés guardar jugadores pendientes o imprimir tarjetas.", "warn");
          btnOficializarTorneo.textContent = "Torneo ya guardado";
          btnOficializarTorneo.disabled = true;
        } else {
          btnOficializarTorneo.textContent = "Guardar Torneo";
          btnOficializarTorneo.disabled = false;
        }
        torneoFecha.value = fechaTexto(torneo.tournament_date);

        const [categoriasRes, teesRes, regsRes, aagRes, pagosRes] = await Promise.all([
          supabase
            .from("tournament_categories")
            .select("id, name, index_min, index_max, tee_id, display_order, gender, slope, course_rating, par, hole_segment")
            .eq("tournament_id", torneo.id)
            .order("display_order", { ascending: true }),

          supabase
            .from("tees")
            .select("id, name, display_order")
            .order("display_order", { ascending: true }),

          supabase
            .from("registrations")
            .select(`
          id,
          tournament_id,
          linked_player_id,
          display_name,
          participant_type,
          aag_member_number,
          club_name,
          country,
          reported_index,
          category_id,
          registration_status,
          needs_admin_review,
          partner_registration_id,
          starting_line_id,
          line_slot_id,
          created_at,
          player:players!linked_player_id (
            gender,
            aag_member_number,
            current_index
          ),
          line_slots (
            id,
            manual_index,
            aag_member_number
          ),
          salida_actual:starting_lines!registrations_starting_line_id_fkey (
            id,
            line_time,
            starting_hole,
            label
          ),
          scorecards (
            id,
            official_index,
            manual_index,
            playing_handicap,
            category_id,
            category_name,
            tee_id,
            tee_name,
            card_status,
            display_name,
            aag_member_number,
            aag_exportable,
            hole_segment,
            slope,
            course_rating,
            par,
            hole_scores
          )
        `)
            .eq("tournament_id", torneo.id)
            .neq("registration_status", "cancelled")
            .order("created_at", { ascending: true }),

          supabase
            .from("aag_enrolleds")
            .select("enrollment_number, current_index, gender, club_name"),

          supabase
            .from("tournament_payments")
            .select("*")
            .eq("tournament_id", torneo.id)
        ]);

        if (categoriasRes.error) throw categoriasRes.error;
        if (teesRes.error) throw teesRes.error;
        if (regsRes.error) throw regsRes.error;
        if (aagRes.error) throw aagRes.error;
        if (pagosRes.error) {
          console.warn("No se pudieron cargar pagos. Se muestra la tabla igual.", pagosRes.error);
        }

        aagEnrolledsMap = new Map(
          (aagRes.data || [])
            .filter(j => j.enrollment_number)
            .map(j => [normalizarMatriculaAAG(j.enrollment_number), j])
        );

        console.log("AAG MAP CARGADO", {
          total: aagEnrolledsMap.size,
          muestra: Array.from(aagEnrolledsMap.entries()).slice(0, 5)
        });

        categorias = categoriasRes.data || [];
        tees = teesRes.data || [];
        registrations = regsRes.data || [];

        const salidaIds = [
          ...new Set(
            registrations
              .map(r => r.starting_line_id)
              .filter(Boolean)
              .map(String)
          )
        ];

        if (salidaIds.length) {
          const { data: salidasData, error: salidasError } = await supabase
            .from("starting_lines")
            .select("id, line_time, starting_hole, label")
            .in("id", salidaIds);

          if (salidasError) throw salidasError;

          startingLinesMap = new Map(
            (salidasData || []).map(l => [String(l.id), l])
          );
        } else {
          startingLinesMap = new Map();
        }

        pagosMap = new Map(((pagosRes.error ? [] : pagosRes.data) || []).map(p => [String(p.registration_id), p]));

        rebuildIndexes();

        renderTabla();
        actualizarResumen();

        suscribirRealtimeOficializacion();

        if (!autoRefreshTimer) {

          autoRefreshTimer = setInterval(() => {

            const activo = document.activeElement;

            const usuarioEscribiendo =
              activo &&
              (
                activo.matches("input, select, textarea") ||
                tablaWrap.contains(activo)
              );

            // también bloquear si hay texto escrito en el buscador
            const buscandoJugador =
              document.getElementById("buscadorJugadores")?.value?.trim()?.length > 0;

            if (
              torneoActual?.id &&
              !usuarioEscribiendo &&
              !buscandoJugador &&
              !usuarioEditandoTabla
            ) {
              cargarTodo(true);
            }

          }, 5000);

        }

        if (String(torneoActual.status || "").toLowerCase() === "officialized") {
          setEstado(`Torneo ya guardado · ${torneoActual?.game_modes?.name || "Modalidad sin definir"}`, "warn");
        } else {
          setEstado(`Datos cargados · ${torneoActual?.game_modes?.name || "Modalidad sin definir"}`, "ok");
        }
      } catch (err) {
        console.error(err);
        tablaWrap.innerHTML = `<div class="empty">Error al cargar datos.</div>`;
        setEstado(err.message || "No se pudo cargar la oficialización.", "error");
      }
    }

    function pairSharedScorecard(reg1, reg2) {
      return extraerScorecard(reg1) || extraerScorecard(reg2) || null;
    }

    function obtenerIndexBaseParaCalculo(reg) {
      const indiceAAG = obtenerIndiceAAG(reg);
      if (indiceAAG != null) return indiceAAG;

      const input = document.getElementById(`idx-pair-${reg.id}`);
      if (input) {
        const valor = String(input.value || "").trim().replace(",", ".");
        return toNumber(valor);
      }

      const score = extraerScorecard(reg);
      return toNumber(score?.official_index ?? score?.manual_index ?? reg.reported_index);
    }

        return `<div>${valor || "—"}</div>`;
      }

      return `

          value="${valor || ""}"

          inputmode="decimal"
          style="height:28px; font-size:12px; text-align:center;"

            <col style="width:17%">  <!-- Jugador -->
            <col style="width:8%">   <!-- Horario -->

    }

    function limpiarTextoBusqueda(valor) {
      return String(valor || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function filtrarTablaJugadores() {

      const busqueda = limpiarTextoBusqueda(
        document.getElementById("buscadorJugadores")?.value || ""
      );

      const palabras = busqueda
        .split(" ")
        .filter(Boolean);

      const filas = tablaWrap.querySelectorAll("tbody tr");

      filas.forEach((fila) => {

        const contenido = limpiarTextoBusqueda(fila.innerText);

        const coincide =
          palabras.length === 0
            ? true
            : palabras.every((palabra) =>
              contenido.includes(palabra)
            );

        fila.style.display = coincide
          ? ""
          : "none";

      });
    }

    function refrescarFilaSingle(reg) {
      const catEl = document.getElementById(`cat-${reg.id}`);
      const teeEl = document.getElementById(`tee-${reg.id}`);

      const hcpEl = document.getElementById(`hcp-${reg.id}`);

      if (!catEl || !teeEl || !idxEl || !hcpEl) return;

      const indiceAAG = obtenerIndiceAAG(reg);
      const sinIndexAAG = jugadorSinIndexAAG(reg);

      let categoriaId = catEl.value || null;
      let categoria = getCategoriaById(categoriaId);

      let indiceManual = sinIndexAAG
        ? obtenerIndexManualEditable(reg.id)
        : calcularIndiceManualMedal(indiceAAG, categoria);

      // Si no trae Index AAG y escribiste un index manual,
      // busca automáticamente la categoría correspondiente.
      if (sinIndexAAG && indiceManual != null && autoCategoriaDesdeIndexManual) {
        const categoriaAuto = sugerirCategoria(indiceManual, reg.player?.gender);

        if (categoriaAuto) {
          catEl.value = categoriaAuto.id;

          categoriaId = categoriaAuto.id;
          categoria = categoriaAuto;
        }

        autoCategoriaDesdeIndexManual = false;
      }

      // Si tiene Index AAG, recalcula el index manual según la categoría actual.
      if (!sinIndexAAG) {
        indiceManual = calcularIndiceManualMedal(indiceAAG, categoria);
        idxEl.value = formatIndexManual(indiceManual);
      }

      const hcpJuego = calcularHcpDesdeCategoria(indiceManual, categoria);

      teeEl.value = categoria ? getTeeName(categoria.tee_id) : "";
      hcpEl.value = hcpJuego ?? "";
    }

    function refrescarFilaPair(reg1, reg2) {
      const key = `${reg1.id}__PAIR__${reg2.id}`;
      const hcpCell = document.getElementById(`hcp-pair-${key}`);
      if (!hcpCell) return;

      const idxBase1 = obtenerIndexBaseParaCalculo(reg1);
      const idxBase2 = obtenerIndexBaseParaCalculo(reg2);

      if (esMetodoClasico()) {
        const categoriaId = document.getElementById(`cat-pair-${key}`)?.value || null;
        const categoria = getCategoriaById(categoriaId);
        const teeEl = document.getElementById(`tee-pair-${key}`);
        const indiceManual = calcularIndiceManualClasico(idxBase1, idxBase2, categoria);
        const hcpJuego = calcularHcpDesdeCategoria(indiceManual, categoria);
        const manualCell = document.querySelector(`#cat-pair-${key}`)?.closest("tr")?.children[5];

        if (teeEl) teeEl.value = categoria ? getTeeName(categoria.tee_id) : "";
        if (manualCell) {
          manualCell.innerHTML = `
            <div class="stack-compact">
              ${renderInputIndexPareja(reg1)}
              <div class="pair-divider"></div>
              ${renderInputIndexPareja(reg2)}
              <div class="pair-divider"></div>
              <div style="font-weight:700;">Pareja: ${formatIndexManual(indiceManual) || "—"}</div>
            </div>
          `;
          activarInputsPareja(reg1, reg2);
        }
        hcpCell.innerHTML = `<div class="stack-compact"><div>${hcpJuego ?? "—"}</div></div>`;
        return;
      }

      const categoriaId1 = document.getElementById(`cat-pair-${reg1.id}`)?.value || null;
      const categoriaId2 = document.getElementById(`cat-pair-${reg2.id}`)?.value || null;
      const categoria1 = getCategoriaById(categoriaId1);
      const categoria2 = getCategoriaById(categoriaId2);
      const indiceManual1 = calcularIndiceManualAmericana(idxBase1, categoria1);
      const indiceManual2 = calcularIndiceManualAmericana(idxBase2, categoria2);
      const hcpJuego1 = calcularHcpDesdeCategoria(indiceManual1, categoria1);
      const hcpJuego2 = calcularHcpDesdeCategoria(indiceManual2, categoria2);
      const teeEl1 = document.getElementById(`tee-pair-${reg1.id}`);
      const teeEl2 = document.getElementById(`tee-pair-${reg2.id}`);
      const manualCell = document.querySelector(`#cat-pair-${reg1.id}`)?.closest("tr")?.children[5];

      if (teeEl1) teeEl1.value = categoria1 ? getTeeName(categoria1.tee_id) : "";
      if (teeEl2) teeEl2.value = categoria2 ? getTeeName(categoria2.tee_id) : "";
      if (manualCell) {
        manualCell.innerHTML = `
          <div class="stack-compact">
            ${renderInputIndexPareja(reg1)}
            <div style="font-weight:700;">${formatIndexManual(indiceManual1) || "—"}</div>
            <div class="pair-divider"></div>
            ${renderInputIndexPareja(reg2)}
            <div style="font-weight:700;">${formatIndexManual(indiceManual2) || "—"}</div>
          </div>
        `;
        activarInputsPareja(reg1, reg2);
      }
      hcpCell.innerHTML = `
        <div class="stack-compact">
          <div>${hcpJuego1 ?? "—"}</div>
          <div class="pair-divider"></div>
          <div>${hcpJuego2 ?? "—"}</div>
        </div>
      `;
    }

    function activarInputsPareja(reg1, reg2) {
      for (const reg of [reg1, reg2]) {
        const idxEl = document.getElementById(`idx-pair-${reg.id}`);
        if (!idxEl || idxEl.dataset.listenerOk === "1") continue;
        idxEl.dataset.listenerOk = "1";
        idxEl.addEventListener("blur", () => refrescarFilaPair(reg1, reg2));

        idxEl.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            idxEl.blur();
          }
        });
      }
    }

    function activarCalculoAutomatico() {
      for (const fila of construirFilasVista()) {
        if (fila.tipo === "single") {
          const reg = fila.jugadores[0];

          const catEl = document.getElementById(`cat-${reg.id}`);
          const idxEl = document.getElementById(`idx-${reg.id}`);

          if (catEl) {
            catEl.addEventListener("change", () => {
              autoCategoriaDesdeIndexManual = false;
              refrescarFilaSingle(reg);
            });
          }

          if (idxEl && jugadorSinIndexAAG(reg)) {
            idxEl.addEventListener("blur", () => {
              autoCategoriaDesdeIndexManual = true;
              refrescarFilaSingle(reg);
            });
          }

          refrescarFilaSingle(reg);
        }

        if (fila.tipo === "pair") {
          const [reg1, reg2] = fila.jugadores;
          activarInputsPareja(reg1, reg2);
          refrescarFilaPair(reg1, reg2);
        }
      }
    }

    function manejarCambioTabla(e) {
      const select = e.target.closest("select[id^='cat-']");
      if (!select) return;

      if (select.id.startsWith("cat-pair-")) {
        const raw = select.id.replace("cat-pair-", "");
        if (raw.includes("__PAIR__")) {
          const [id1, id2] = raw.split("__PAIR__");
          const reg1 = getRegistrationById(id1);
          const reg2 = getRegistrationById(id2);
          if (reg1 && reg2) refrescarFilaPair(reg1, reg2);
          return;
        }

        const fila = construirFilasVista().find((f) =>
          f.tipo === "pair" && f.jugadores.some((r) => String(r.id) === String(raw))
        );
        if (fila) refrescarFilaPair(fila.jugadores[0], fila.jugadores[1]);
        return;
      }

      const regId = select.id.replace("cat-", "");
      const reg = getRegistrationById(regId);
      if (reg) refrescarFilaSingle(reg);
    }

    function manejarClickTabla(e) {
      const btn = e.target.closest("button");
      if (!btn) return;

      if (btn.dataset.save) {
        guardarOficializacionSingle(btn.dataset.save);
        return;
      }

      if (btn.dataset.savePair) {
        const [id1, id2] = btn.dataset.savePair.split("__PAIR__");
        guardarOficializacionPair(id1, id2);
        return;
      }

      if (btn.dataset.printCard) {
        imprimirTarjeta(btn.dataset.printCard);
        return;
      }

      if (btn.dataset.printPairCard) {
        const [id1, id2] = btn.dataset.printPairCard.split("__PAIR__");
        imprimirTarjetaPareja(id1, id2);
        return;
      }

      if (btn.dataset.printCoupon) {
        imprimirCuponIndividual(btn.dataset.printCoupon);
        return;
      }

    }

    function obtenerDatosFilaSingle(regId) {
      const reg = getRegistrationById(regId);
      if (!reg) return null;
      const categoriaId = document.getElementById(`cat-${regId}`)?.value || null;
      const categoria = getCategoriaById(categoriaId);
      const indiceAAG = obtenerIndiceAAG(reg);
      const indiceManual = jugadorSinIndexAAG(reg)
        ? obtenerIndexManualEditable(regId)
        : calcularIndiceManualMedal(indiceAAG, categoria);
      const playingHandicap = calcularHcpDesdeCategoria(indiceManual, categoria);

      return {
        categoriaId,
        teeId: categoria?.tee_id || null,
        officialIndex: indiceAAG,
        manualIndex: indiceManual,
        playingHandicap
      };
    }

    function obtenerDatosFilaPair(reg1, reg2) {
      const idxBase1 = obtenerIndexBaseParaCalculo(reg1);
      const idxBase2 = obtenerIndexBaseParaCalculo(reg2);

      if (esMetodoClasico()) {
        const key = `${reg1.id}__PAIR__${reg2.id}`;
        const categoriaId = document.getElementById(`cat-pair-${key}`)?.value || null;
        const categoria = getCategoriaById(categoriaId);
        const manualIndex = calcularIndiceManualClasico(idxBase1, idxBase2, categoria);
        const playingHandicap = calcularHcpDesdeCategoria(manualIndex, categoria);

        return {
          modo: "clasico",
          categoriaId,
          teeId: categoria?.tee_id || null,
          officialIndex1: idxBase1,
          officialIndex2: idxBase2,
          manualIndex,
          playingHandicap
        };
      }

      const categoriaId1 = document.getElementById(`cat-pair-${reg1.id}`)?.value || null;
      const categoriaId2 = document.getElementById(`cat-pair-${reg2.id}`)?.value || null;
      const categoria1 = getCategoriaById(categoriaId1);
      const categoria2 = getCategoriaById(categoriaId2);
      const manualIndex1 = calcularIndiceManualAmericana(idxBase1, categoria1);
      const manualIndex2 = calcularIndiceManualAmericana(idxBase2, categoria2);
      const playingHandicap1 = calcularHcpDesdeCategoria(manualIndex1, categoria1);
      const playingHandicap2 = calcularHcpDesdeCategoria(manualIndex2, categoria2);

      return {
        modo: "americana",
        categoriaId1,
        categoriaId2,
        teeId1: categoria1?.tee_id || null,
        teeId2: categoria2?.tee_id || null,
        officialIndex1: idxBase1,
        officialIndex2: idxBase2,
        manualIndex1,
        manualIndex2,
        playingHandicap1,
        playingHandicap2
      };
    }

    async function guardarPagoJugador(reg) {
      const pagoActual = obtenerPagoActualReg(reg);

      const payload = {
        tournament_id: torneoActual.id,
        registration_id: reg.id,
        linked_player_id: reg.linked_player_id || null,
        display_name: reg.display_name || "Sin nombre",
        aag_member_number: getAagMemberNumber(reg),
        payment_method: pagoActual.metodo,
        payment_date: pagoActual.fecha,
        amount: obtenerImporteSegunPago(reg),
        updated_at: new Date().toISOString()
      };

      const { data, error } = await supabase
        .from("tournament_payments")
        .upsert(payload, { onConflict: "registration_id" })
        .select("*")
        .single();

      if (error) throw error;

      pagosMap.set(String(reg.id), data || payload);
      return data || payload;
    }

    function getAagMemberNumber(reg) {
      return reg?.player?.aag_member_number || reg?.aag_member_number || null;
    }

    function crearHoleScoresVacio() {
      const holeScores = {};
      for (let i = 1; i <= 18; i++) {
        holeScores[String(i)] = null;
      }
      return holeScores;
    }

    function datosCategoriaParaScorecard(categoria) {
      return {
        category_name: categoria?.name || null,
        tee_name: categoria?.tee_id ? getTeeName(categoria.tee_id) : null,
        hole_segment: categoria?.hole_segment || null,
        slope: categoria?.slope ?? null,
        course_rating: categoria?.course_rating ?? null,
        par: categoria?.par ?? null
      };
    }

    function payloadExportacionIndividual(reg, datos, categoria) {
      const matriculaAag = getAagMemberNumber(reg);

      return {
        aag_member_number: matriculaAag,
        manual_index: datos.manualIndex,
        player_gender: normalizarGenero(reg?.player?.gender || null) || null,
        aag_exportable: !!matriculaAag,
        hole_scores: crearHoleScoresVacio(),
        ...datosCategoriaParaScorecard(categoria)
      };
    }

    function payloadInternoPareja(datos, categoria) {
      return {
        aag_member_number: null,
        manual_index: datos.manualIndex ?? datos.manualIndex1 ?? null,
        player_gender: null,
        aag_exportable: false,
        hole_scores: crearHoleScoresVacio(),
        ...datosCategoriaParaScorecard(categoria)
      };
    }

    async function upsertScorecardIndividual(reg, payload) {
      const scorecardExistente = extraerScorecard(reg);
      if (scorecardExistente?.id) {
        const { error } = await supabase.from("scorecards").update(payload).eq("id", scorecardExistente.id);
        if (error) throw error;
        return scorecardExistente.id;
      }

      const { data: nuevaScorecard, error } = await supabase.from("scorecards").insert({
        tournament_id: torneoActual.id,
        registration_id: reg.id,
        linked_player_id: reg.linked_player_id,
        display_name: reg.display_name,
        aag_member_number: getAagMemberNumber(reg),
        ...payload
      }).select("id").single();
      if (error) throw error;
      return nuevaScorecard.id;
    }

    async function upsertScorecardPareja(reg1, reg2, payload) {
      const existente = pairSharedScorecard(reg1, reg2);

      if (existente?.id) {
        const { error } = await supabase
          .from("scorecards")
          .update(payload)
          .eq("id", existente.id);

        if (error) throw error;
        return existente.id;
      }

      const { data: nuevaScorecard, error } = await supabase
        .from("scorecards")
        .insert({
          tournament_id: torneoActual.id,
          registration_id: reg1.id,
          linked_player_id: reg1.linked_player_id,
          display_name: payload.display_name,
          aag_member_number: null,
          ...payload
        })
        .select("id")
        .single();

      if (error) throw error;

      return nuevaScorecard.id;
    }

    async function actualizarRegistroConfirmado(regId, categoriaId) {
      const reg = getRegistrationById(regId);
      const matricula = obtenerMatriculaAAG(reg);
      const indiceAAG = obtenerIndiceAAG(reg);

      const payloadReg = {
        category_id: categoriaId,
        registration_status: "confirmed",
        needs_admin_review: false
      };

      if (matricula) payloadReg.aag_member_number = matricula;
      if (indiceAAG != null) payloadReg.reported_index = indiceAAG;

      const { error } = await supabase
        .from("registrations")
        .update(payloadReg)
        .eq("id", regId);

      if (error) throw error;

      if (reg?.line_slot_id) {
        const payloadSlot = {};

        if (matricula) payloadSlot.aag_member_number = matricula;
        if (indiceAAG != null) payloadSlot.manual_index = indiceAAG;

        if (Object.keys(payloadSlot).length > 0) {
          const { error: slotError } = await supabase
            .from("line_slots")
            .update(payloadSlot)
            .eq("id", reg.line_slot_id);

          if (slotError) throw slotError;
        }
      }
    }

    async function guardarOficializacionSingle(regId, silencioso = false) {
      const reg = getRegistrationById(regId);
      if (!reg) return;

      const datos = obtenerDatosFilaSingle(regId);
      if (!datos || !datos.categoriaId || !datos.teeId || datos.manualIndex == null || datos.playingHandicap == null) {
        if (!silencioso) alert(`Revisá los datos de ${reg.display_name}.`);
        throw new Error(`Datos incompletos en ${reg.display_name}`);
      }

      const line = extraerLinea(reg);
      const categoria = getCategoriaById(datos.categoriaId);
      const payload = {
        category_id: datos.categoriaId,
        tee_id: datos.teeId,
        official_index: datos.officialIndex,
        playing_handicap: datos.playingHandicap,
        starting_time: line?.line_time || null,
        starting_hole: line?.starting_hole || null,
        card_status: "npt",
        ...payloadExportacionIndividual(reg, datos, categoria)
      };

      if (!silencioso) setEstado(`Guardando oficialización de ${reg.display_name}...`);
      await upsertScorecardIndividual(reg, payload);
      await actualizarRegistroConfirmado(reg.id, datos.categoriaId);

      if (!silencioso) {
        await cargarTodo();
        setEstado(`Jugador oficializado: ${reg.display_name}`, "ok");
      }
    }

    async function guardarOficializacionPair(regId1, regId2, silencioso = false) {
      const reg1 = getRegistrationById(regId1);
      const reg2 = getRegistrationById(regId2);
      if (!reg1 || !reg2) return;

      const datos = obtenerDatosFilaPair(reg1, reg2);
      if (!datos) throw new Error("No se pudo calcular la pareja.");

      if (datos.modo === "clasico") {
        if (!datos.categoriaId || !datos.teeId || datos.manualIndex == null || datos.playingHandicap == null) {
          if (!silencioso) alert(`Revisá los datos de la pareja ${reg1.display_name} / ${reg2.display_name}.`);
          throw new Error(`Datos incompletos en pareja ${reg1.display_name} / ${reg2.display_name}`);
        }
      } else {
        if (!datos.categoriaId1 || !datos.categoriaId2 || !datos.teeId1 || !datos.teeId2 || datos.manualIndex1 == null || datos.manualIndex2 == null || datos.playingHandicap1 == null || datos.playingHandicap2 == null) {
          if (!silencioso) alert(`Revisá los datos de la pareja ${reg1.display_name} / ${reg2.display_name}.`);
          throw new Error(`Datos incompletos en pareja ${reg1.display_name} / ${reg2.display_name}`);
        }
      }

      if (!silencioso) setEstado(`Guardando oficialización de pareja ${reg1.display_name} / ${reg2.display_name}...`);

      const line = extraerLinea(reg1) || extraerLinea(reg2);
      const displayNamePareja = datos.modo === "clasico"
        ? `${reg1.display_name} / ${reg2.display_name}`
        : `${reg1.display_name} (${datos.playingHandicap1}) / ${reg2.display_name} (${datos.playingHandicap2})`;

      const categoriaPrincipal = getCategoriaById(datos.modo === "clasico" ? datos.categoriaId : datos.categoriaId1);

      await upsertScorecardPareja(reg1, reg2, {
        category_id: datos.modo === "clasico" ? datos.categoriaId : datos.categoriaId1,
        tee_id: datos.modo === "clasico" ? datos.teeId : datos.teeId1,
        official_index: datos.modo === "clasico" ? datos.manualIndex : datos.manualIndex1,
        playing_handicap: datos.modo === "clasico" ? datos.playingHandicap : datos.playingHandicap1,
        starting_time: line?.line_time || null,
        starting_hole: line?.starting_hole || null,
        card_status: "npt",
        display_name: displayNamePareja,
        ...payloadInternoPareja(datos, categoriaPrincipal)
      });

      await actualizarRegistroConfirmado(reg1.id, datos.modo === "clasico" ? datos.categoriaId : datos.categoriaId1);
      await actualizarRegistroConfirmado(reg2.id, datos.modo === "clasico" ? datos.categoriaId : datos.categoriaId2);

      if (!silencioso) {
        await cargarTodo();
        setEstado(`Pareja oficializada: ${reg1.display_name} / ${reg2.display_name}`, "ok");
      }
    }

    function validarAntesDeGuardarTodos() {
      const errores = [];

      for (const fila of construirFilasVista()) {
        if (fila.tipo === "single") {
          const reg = fila.jugadores[0];
          const datos = obtenerDatosFilaSingle(reg.id);
          if (!datos?.categoriaId) errores.push(`Revisar categoría de ${reg.display_name}`);
          if (!datos?.teeId) errores.push(`Revisar tee de ${reg.display_name}`);
          if (datos?.manualIndex == null) errores.push(`Revisar índice manual de ${reg.display_name}`);
          if (datos?.playingHandicap == null) errores.push(`Falta HCP de juego en ${reg.display_name}`);
        }

        if (fila.tipo === "pair") {
          const [reg1, reg2] = fila.jugadores;
          const datos = obtenerDatosFilaPair(reg1, reg2);

          if (datos?.modo === "clasico") {
            if (!datos.categoriaId) errores.push(`Revisar categoría de la pareja ${reg1.display_name} / ${reg2.display_name}`);
            if (!datos.teeId) errores.push(`Revisar tee de la pareja ${reg1.display_name} / ${reg2.display_name}`);
            if (datos.manualIndex == null) errores.push(`Revisar índice manual de la pareja ${reg1.display_name} / ${reg2.display_name}`);
            if (datos.playingHandicap == null) errores.push(`Falta HCP de juego de la pareja ${reg1.display_name} / ${reg2.display_name}`);
          }

          if (datos?.modo === "americana") {
            if (!datos.categoriaId1) errores.push(`Revisar categoría de ${reg1.display_name}`);
            if (!datos.categoriaId2) errores.push(`Revisar categoría de ${reg2.display_name}`);
            if (!datos.teeId1) errores.push(`Revisar tee de ${reg1.display_name}`);
            if (!datos.teeId2) errores.push(`Revisar tee de ${reg2.display_name}`);
            if (datos.manualIndex1 == null) errores.push(`Revisar índice manual de ${reg1.display_name}`);
            if (datos.manualIndex2 == null) errores.push(`Revisar índice manual de ${reg2.display_name}`);
            if (datos.playingHandicap1 == null) errores.push(`Falta HCP de juego en ${reg1.display_name}`);
            if (datos.playingHandicap2 == null) errores.push(`Falta HCP de juego en ${reg2.display_name}`);
          }
        }
      }

      return errores;
    }

    async function guardarTodosLosInscriptos() {
      const textoOriginal = btnGuardarTodos.textContent || "Guardar todos";

      if (!registrations.length) {
        alert("No hay inscriptos para guardar.");
        return;
      }

      const errores = validarAntesDeGuardarTodos();
      if (errores.length > 0) {
        setEstado("Hay jugadores para revisar antes de guardar.", "warn");
        alert("No se puede guardar todavía.\n\n" + errores.slice(0, 20).join("\n") + (errores.length > 20 ? "\n..." : ""));
        return;
      }

      btnGuardarTodos.disabled = true;
      btnGuardarTodos.textContent = "Guardando...";
      setEstado("Guardando oficialización general...");

      try {
        for (const fila of construirFilasVista()) {
          if (fila.tipo === "single") {
            await guardarOficializacionSingle(fila.jugadores[0].id, true);
          } else {
            await guardarOficializacionPair(fila.jugadores[0].id, fila.jugadores[1].id, true);
          }
        }

        await cargarTodo();

        setEstado("Todos los inscriptos fueron guardados correctamente.", "ok");

      } catch (error) {
        console.error(error);

        setEstado(error.message || "Ocurrió un error al guardar todos.", "error");

        alert("Error al guardar:\n\n" + (error.message || JSON.stringify(error)));

      } finally {
        btnGuardarTodos.disabled = false;
        btnGuardarTodos.textContent = textoOriginal;
      }
    }

    function pairOficializada(reg1, reg2) {
      return !!pairSharedScorecard(reg1, reg2)?.id;
    }

    async function oficializarTorneo() {
      if (!torneoActual?.id) return;

      const pendientes = [];
      for (const fila of construirFilasVista()) {
        if (fila.tipo === "single") {
          if (!extraerScorecard(fila.jugadores[0])?.id) pendientes.push(fila.jugadores[0].display_name);
        } else {
          if (!pairOficializada(fila.jugadores[0], fila.jugadores[1])) pendientes.push(`${fila.jugadores[0].display_name} / ${fila.jugadores[1].display_name}`);
        }
      }

      if (pendientes.length > 0) {
        alert(`No podés oficializar el torneo.\n\nHay ${pendientes.length} fila(s) sin oficializar.`);
        return;
      }

      const confirmar = confirm(`¿Querés guardar el torneo "${torneoActual.name}"?`);
      if (!confirmar) return;

      setEstado("Oficializando torneo...");

      const { error } = await supabase
        .from("tournaments")
        .update({ status: "officialized" })
        .eq("id", torneoActual.id);

      if (error) {
        console.error(error);
        alert(`No se pudo oficializar el torneo.\n\n${error.message || "Sin detalle"}`);
        setEstado("Error al oficializar", "error");
        return;
      }

      await cargarTodo();
      setEstado("Torneo oficializado correctamente", "ok");
    }

    function nombreParaTarjeta(nombreCompleto) {
      const limpio = String(nombreCompleto || "").trim().replace(/\s+/g, " ");
      if (!limpio) return "";

      if (limpio.includes(",")) {
        const [apellidoRaw, nombresRaw = ""] = limpio.split(",");
        const apellido = apellidoRaw.trim();
        const iniciales = nombresRaw.trim().split(/\s+/).filter(Boolean).map(n => `${n[0].toUpperCase()}.`).join(" ");
        return iniciales ? `${apellido}, ${iniciales}` : apellido;
      }

      const partes = limpio.split(" ").filter(Boolean);
      if (partes.length <= 1) return limpio;
      const apellido = partes[partes.length - 1];
      const iniciales = partes.slice(0, -1).map(n => `${n[0].toUpperCase()}.`).join(" ");
      return `${apellido}, ${iniciales}`;
    }

      const base = Math.floor(hcp / 18);
      const resto = hcp % 18;

      const golpes = base + (hcpHoyo <= resto ? 1 : 0);

      return golpes > 0 ? String(Math.min(golpes, 3)) : "";
    }

        const golpesA = golpesEnHoyo(hcpJugadorA, hcpHoyo);

            <div><b>Jugador:</b> ${regParaCobrar?.display_name || ""}</div>
            <div><b>Pareja:</b> ${nombrePareja}</div>
            <div><b>Matrícula:</b> ${regParaCobrar?.aag_member_number || regParaCobrar?.player?.aag_member_number || "—"}</div>
            <div><b>Hora:</b> ${horaTexto(line?.line_time) || "—"}</div>
            <div><b>Concepto:</b> Green fee / derecho de torneo</div>
            <div><b>Importe:</b> ${money(obtenerImporteSegunPago())}
            <div><b>Forma de pago:</b> ${PAYMENT_METHODS[pagoGeneral?.value || "pending"] || "Pendiente"}</div>
            <div><b>Fecha pago:</b> ${fechaTexto(fechaPagoGeneral?.value || hoyInputLocal())}</div>
          </div>
          <div style="border-top:1px dashed #000; margin:6px 0;"></div>
          <div style="font-size:11px; text-align:center;">NO VÁLIDO COMO FACTURA</div>
        </div>
      `;
    }

    function doPrint(html) {

      printRoot.innerHTML = html;

      setTimeout(() => {

        window.print();

        setTimeout(() => {
          printRoot.innerHTML = "";
        }, 700);

      }, 150);
    }

    async function imprimirCuponIndividual(regId) {
      const reg = getRegistrationById(regId);
      if (!reg) return;

      try {
        const numeroCupon = await obtenerNumeroCupon();

        const html = buildCuponHTMLIndividual(reg, numeroCupon);

        guardarPrecioTorneoLocal();
        await window.imprimirTicketQZ(html);

        //printRoot.innerHTML = html;

        //printRoot.style.display = "block";
        //printRoot.style.background = "white";
        //printRoot.style.padding = "20px";

        try {
          await guardarPagoJugador(reg);
          setEstado(`Cupón impreso y pago guardado: ${reg.display_name}`, "ok");
        } catch (errorPago) {
          console.error(errorPago);
          setEstado(`Cupón impreso, pero no se pudo guardar el pago de ${reg.display_name}.`, "warn");
          alert("El cupón se imprimió, pero no se pudo guardar el pago:\n\n" + (errorPago.message || JSON.stringify(errorPago)));
        }

      } catch (error) {
        console.error(error);
        alert("Error generando número de cupón: " + (error.message || JSON.stringify(error)));
      }
    }

    mostrarSucursal();
    cargarTodo();

    document.getElementById("btnHome").addEventListener("click", () => {
      window.location.href = "panel.html";
    });
  </script>
</body>
