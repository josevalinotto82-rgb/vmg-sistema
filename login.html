<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - Villa María Golf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f8f3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            width: 320px;
        }

        h2 {
            margin: 0 0 20px;
            color: #166534;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #166534;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            color: #b91c1c;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Ingreso VMGC</h2>

        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Contraseña">

        <button id="loginBtn" type="button">Ingresar</button>

        <div id="msg" class="error"></div>
    </div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

        const supabase = createClient(
            "https://bnnfolhrqxgxjmobclrm.supabase.co",
            "sb_publishable_pNxU4AFpAZPpeJ0wICLvIw_6nW90njQ"
        );

        // 🔐 PROTECCIÓN
        const { data: { session } } = await supabase.auth.getSession();

        if (!session) {
            window.location.href = "login.html";
        }

        const { data: profile } = await supabase
            .from("profiles")
            .select("role, active")
            .eq("id", session.user.id)
            .maybeSingle();

        if (!profile || profile.role !== "admin") {
            alert("Acceso restringido");
            window.location.href = "panel.html";
        }

        const emailEl = document.getElementById("email");
        const passwordEl = document.getElementById("password");
        const loginBtn = document.getElementById("loginBtn");
        const msg = document.getElementById("msg");

        loginBtn.addEventListener("click", async () => {
            msg.textContent = "";

            const email = emailEl.value.trim();
            const password = passwordEl.value;

            if (!email || !password) {
                msg.textContent = "Ingresá email y contraseña.";
                return;
            }

            const { error } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                msg.textContent = error.message;
                return;
            }

            window.location.href = "panel.html";
        });
    </script>
</body>

</html>
